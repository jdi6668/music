<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>水下气泡节奏音符游戏 · 黑色毛衣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  body {
    background: linear-gradient(180deg, #0a4d72 0%, #063250 32%, #041f38 66%, #010b18 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #game-wrap {
    position: relative;
    width: 100vw; height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 26px; pointer-events: none; z-index: 5;
    color: #eaf6ff; text-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .hud-box { background: rgba(6,44,71,.45); border:1px solid rgba(120,200,255,.25);
    backdrop-filter: blur(4px); border-radius: 14px; padding: 10px 18px; }
  .hud-label { font-size: 12px; letter-spacing: 2px; opacity:.7; }
  .hud-value { font-size: 26px; font-weight: 700; }
  #combo-value { color:#7fe0ff; }

  /* Start / End overlays */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(10,61,98,.75), rgba(4,26,46,.92));
    color: #eaf6ff; text-align: center; gap: 22px;
  }
  .overlay.hidden { display: none; }
  .title { font-size: 44px; font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(90deg,#7fe0ff,#c7f0ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 30px rgba(127,224,255,.35); }
  .subtitle { font-size: 16px; opacity: .8; max-width: 560px; line-height: 1.8; }
  .btn {
    pointer-events: auto; cursor: pointer;
    padding: 14px 46px; font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: #052033; border: none; border-radius: 40px;
    background: linear-gradient(135deg,#7fe0ff,#4fb8e6);
    box-shadow: 0 10px 30px rgba(79,184,230,.45); transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(79,184,230,.6); }
  .hint { font-size: 13px; opacity: .55; }
  .final-stat { font-size: 20px; opacity:.9; }
  .final-stat b { color:#7fe0ff; font-size: 28px; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">SCORE 得分</div>
      <div class="hud-value" id="score-value">0</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">COMBO 连击</div>
      <div class="hud-value" id="combo-value">0</div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">TIME 进度</div>
      <div class="hud-value" id="time-value">0:00</div>
    </div>
  </div>

  <div class="overlay" id="start-overlay">
    <div class="title">水下气泡节奏音符</div>
    <div class="subtitle">
      一颗气泡沿着《黑色毛衣》的歌词阶梯持续上升，镜头跟着它一路向上。<br>
      每唱到一个字，气泡就会撞上那个字弹一下、点亮它，然后继续上浮撞向下一个字。
    </div>
    <button class="btn" id="start-btn">开始游戏</button>
    <div class="hint">建议戴上耳机 · 气泡与歌声同步逐字弹跳</div>
  </div>

  <div class="overlay hidden" id="end-overlay">
    <div class="title">歌曲结束</div>
    <div class="final-stat">最终得分 <b id="final-score">0</b></div>
    <div class="final-stat">最高连击 <b id="final-combo">0</b></div>
    <div class="final-stat">命中字数 <b id="final-hits">0</b></div>
    <button class="btn" id="restart-btn">再玩一次</button>
  </div>
</div>

<script>
/* ============================================================
   水下气泡节奏音符游戏 — 方案A
   音频解析(节拍) → 阶梯式歌词文字轨道 → 水下气泡物理 → 碰撞回弹得分
   ============================================================ */

// ---------- 歌词时间轴 (从 heisemaoyi.lrc 读取) [秒, 文本] ----------
let LYRICS = [];

// 需要过滤掉的非歌词信息 (制作信息 / 标题)
const LRC_SKIP = ['词：','曲：','编曲','制作人','制作','和声','混音','母带','监制',' - ','：Jay','演唱'];

// 解析标准 LRC 文本 -> [ [秒, 文本], ... ]
function parseLRC(text) {
  const out = [];
  const lines = text.split(/\r?\n/);
  const timeTag = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\]/g;
  for (const line of lines) {
    // 收集该行所有时间标签
    const times = [];
    let m;
    timeTag.lastIndex = 0;
    while ((m = timeTag.exec(line)) !== null) {
      const min = parseInt(m[1], 10);
      const sec = parseInt(m[2], 10);
      const frac = m[3] ? parseInt(m[3].padEnd(3, '0'), 10) / 1000 : 0;
      times.push(min * 60 + sec + frac);
    }
    if (!times.length) continue;
    // 去掉时间标签后的纯文本
    const content = line.replace(timeTag, '').trim();
    if (!content) continue;
    if (LRC_SKIP.some(k => content.includes(k))) continue;
    // 一行内多个短句 (空格分隔) 拆成阶梯字块, 时间在到下一句之间均匀分布
    const segs = content.split(/\s+/).filter(Boolean);
    for (const t of times) {
      segs.forEach((seg, i) => {
        out.push([t + i * 2.2, seg]);
      });
    }
  }
  out.sort((a, b) => a[0] - b[0]);
  return out;
}

// 载入 lrc 文件
async function loadLyrics() {
  try {
    const res = await fetch('heisemaoyi.lrc');
    const text = await res.text();
    LYRICS = parseLRC(text);
  } catch (e) {
    console.warn('歌词载入失败, 将无歌词运行', e);
    LYRICS = [];
  }
}

// ---------- Canvas 初始化 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 游戏状态 ----------
const state = {
  running: false,
  score: 0,
  combo: 0,
  maxCombo: 0,
  hits: 0,
  lastFrame: 0,
  nextLyric: 0,
  beatCooldown: 0,
};

// ---------- 音频 ----------
let audioCtx, analyser, freqData, sourceNode, audioEl, gainNode;
let energyHistory = [];

function setupAudio() {
  audioEl = new Audio('heisemaoyi.mp3');
  audioEl.crossOrigin = 'anonymous';
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioEl.addEventListener('ended', endGame);
}

// 撞击音效 (合成)
function playHitSound(strength) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660 + Math.random()*400, t);
  osc.frequency.exponentialRampToValueAtTime(220, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.25 * (0.6 + strength), t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.26);
}

// ---------- 常量 / 世界 ----------
const COLORS = ['#7fe0ff','#a6f0ff','#c7f0ff','#8fd6ff','#b3e5ff'];
const SPEED = 90;          // 每秒上升的世界像素 (气泡上升速度, 与歌词同步)

// ---------- 逐字音符 (歌词拆成单字, 沿竖直阶梯排布) ----------
const notes = [];          // {time, ch, x, worldY, hit, glow, shakeT}

function buildNotes() {
  notes.length = 0;
  const punct = /[，。！？、,.!?；;：:\s（）()「」“”\"']/;
  for (let i = 0; i < LYRICS.length; i++) {
    const t = LYRICS[i][0], text = LYRICS[i][1];
    const nextT = (i + 1 < LYRICS.length) ? LYRICS[i + 1][0] : t + 3;
    const chars = Array.from(text).filter(c => !punct.test(c));
    if (!chars.length) continue;
    // 每个字占用的时间, 让唱到该字时气泡正好撞上
    const dur = Math.max(0.4, Math.min(nextT - t, chars.length * 0.55));
    const step = dur / chars.length;
    chars.forEach((ch, j) => {
      notes.push({ time: t + j * step, ch, x: 0, worldY: 0, hit: false, glow: 0, shakeT: 0 });
    });
  }
  notes.sort((a, b) => a.time - b.time);
  layoutNotes();
}

// 蛇形阶梯横向摆位 + 竖直方向按时间映射 (时间越晚 = 越高 = worldY 越小)
function layoutNotes() {
  const margin = Math.max(56, W * 0.16);
  const span = W - margin * 2;
  const period = 10;
  notes.forEach((n, i) => {
    const phase = (i % period) / period;         // 0..1
    const tri = 1 - Math.abs(phase * 2 - 1);      // 三角波 0..1..0
    n.x = margin + span * tri;
    n.worldY = -n.time * SPEED;
  });
}

function upcomingNote() {
  const t = audioEl.currentTime;
  for (const n of notes) if (n.time >= t - 0.05) return n;
  return null;
}

// ---------- 摄像机 (跟随气泡上升) ----------
const cam = { y: 0 };
function updateCamera(dt) {
  const target = bubble.worldY - H * 0.58;   // 气泡保持在屏幕偏下, 上方可见即将到来的字
  cam.y += (target - cam.y) * Math.min(1, dt * 6);
}

// ---------- 唯一气泡 ----------
const bubble = { x: 0, worldY: 0, r: 22, vx: 0, wobble: 0, bounce: 0, bounceVel: 0, color: '#a6f0ff' };

function resetBubble() {
  bubble.x = W / 2; bubble.worldY = 0; bubble.vx = 0;
  bubble.wobble = Math.random() * 6; bubble.bounce = 0; bubble.bounceVel = 0;
  bubble.color = '#a6f0ff';
  cam.y = bubble.worldY - H * 0.58;
}

function updateBubble(dt) {
  const t = audioEl.currentTime;
  // 基础上升: 世界Y 跟随播放时间, 保证与歌词精准同步
  bubble.worldY = -t * SPEED;
  // 水平: 朝即将唱到的字靠拢, 在字间穿梭
  const up = upcomingNote();
  if (up) bubble.x += (up.x - bubble.x) * Math.min(1, dt * 3.5);
  // 水流轻微左右扰动
  bubble.wobble += dt * 2.2;
  bubble.x += Math.sin(bubble.wobble) * 10 * dt;
  bubble.x = Math.max(bubble.r, Math.min(W - bubble.r, bubble.x));
  // 弹跳: 命中时向下一沉再弹回 (弹簧)
  const k = 90, damp = 7;
  bubble.bounceVel += (-k * bubble.bounce - damp * bubble.bounceVel) * dt;
  bubble.bounce += bubble.bounceVel * dt;
}

function drawBubble() {
  const x = bubble.x;
  const y = (bubble.worldY - cam.y) + bubble.bounce;
  const r = bubble.r;
  const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  g.addColorStop(0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.25, bubble.color + 'cc');
  g.addColorStop(1, bubble.color + '22');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.shadowColor = bubble.color; ctx.shadowBlur = 20; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(x - r*0.32, y - r*0.32, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(200,240,255,0.6)'; ctx.lineWidth = 1; ctx.stroke();
}

// ---------- 阶梯轨迹线 + 逐字绘制 ----------
function drawTrack() {
  ctx.beginPath();
  let started = false;
  for (const n of notes) {
    const sy = n.worldY - cam.y;
    if (sy < -400 || sy > H + 400) { started = false; continue; }
    if (!started) { ctx.moveTo(n.x, sy); started = true; }
    else ctx.lineTo(n.x, sy);
  }
  ctx.strokeStyle = 'rgba(127,224,255,0.14)';
  ctx.lineWidth = 2; ctx.stroke();
}

function drawNotes() {
  ctx.font = '700 24px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const n of notes) {
    const sy = n.worldY - cam.y;
    if (sy < -60 || sy > H + 60) continue;
    let ox = 0, oy = 0;
    if (n.shakeT > 0) { ox = (Math.random()-0.5)*6; oy = (Math.random()-0.5)*6; }
    const x = n.x + ox, y = sy + oy, r = 20;
    ctx.save();
    if (n.hit) {
      const gl = Math.max(0, n.glow);
      ctx.shadowColor = `rgba(255,214,120,${0.4 + gl})`;
      ctx.shadowBlur = 12 + gl * 26;
      ctx.beginPath(); ctx.arc(x, y, r + gl*4, 0, Math.PI*2);
      const g = ctx.createRadialGradient(x-6, y-6, 2, x, y, r + gl*4);
      g.addColorStop(0, 'rgba(255,245,210,0.95)');
      g.addColorStop(1, `rgba(255,190,90,${0.5 + gl*0.4})`);
      ctx.fillStyle = g; ctx.fill();
      ctx.shadowBlur = 0; ctx.fillStyle = '#4a2d00';
    } else {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(127,224,255,0.12)'; ctx.fill();
      ctx.strokeStyle = 'rgba(180,235,255,0.55)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#eaf9ff';
    }
    ctx.fillText(n.ch, x, y + 1);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// ---------- 粒子 (命中特效, 世界坐标) ----------
const particles = [];
function burst(wx, wy, color) {
  for (let i=0;i<12;i++) {
    particles.push({
      x: wx, y: wy,
      vx: (Math.random()-0.5)*280,
      vy: (Math.random()-0.5)*280 - 40,
      life: 0.6 + Math.random()*0.3,
      t: 0, r: 2+Math.random()*3, color
    });
  }
}
function updateParticles(dt) {
  for (const p of particles) {
    p.t += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 200*dt;
  }
  for (let i=particles.length-1;i>=0;i--) if (particles[i].t>particles[i].life) particles.splice(i,1);
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t/p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y - cam.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- 命中判定: 气泡上升到某个字的时间 -> 弹一下 ----------
function checkNotes() {
  const t = audioEl.currentTime;
  for (const n of notes) {
    if (!n.hit && t >= n.time) {
      n.hit = true; n.glow = 1; n.shakeT = 0.18;
      bubble.bounceVel += 260;                         // 撞到字后向下弹一下
      bubble.color = COLORS[(Math.random()*COLORS.length)|0];
      state.score += 100 + state.combo * 5;
      state.combo += 1;
      state.maxCombo = Math.max(state.maxCombo, state.combo);
      state.hits += 1;
      playHitSound(0.7);
      burst(n.x, n.worldY, '#ffd67a');
      updateHUD();
    }
  }
}

// ---------- 装饰气泡 (背景氛围, 屏幕坐标, 不参与玩法) ----------
const ambient = [];
function updateAmbient(dt) {
  // 持续从水底生成不同景深的上浮气泡
  if (Math.random() < dt * 14) {
    const depth = Math.random();   // 0 远(慢/小/淡) .. 1 近(快/大/亮)
    ambient.push({
      x: Math.random()*W, y: H + 12,
      r: 2 + depth*11, v: 22 + depth*80,
      a: 0.10 + depth*0.30,
      ph: Math.random()*6.28, sw: 8 + depth*22
    });
  }
  for (const a of ambient) { a.y -= a.v*dt; a.ph += dt*2; a.x += Math.sin(a.ph)*a.sw*dt; }
  for (let i = ambient.length-1; i >= 0; i--) if (ambient[i].y < -24) ambient.splice(i, 1);
}
function drawAmbient() {
  for (const a of ambient) {
    ctx.globalAlpha = a.a;
    const g = ctx.createRadialGradient(a.x - a.r*0.3, a.y - a.r*0.3, a.r*0.1, a.x, a.y, a.r);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.4, 'rgba(190,240,255,0.5)');
    g.addColorStop(1, 'rgba(150,220,255,0.05)');
    ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
    ctx.globalAlpha = a.a * 0.7;
    ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(200,240,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ---------- 深海环境背景 ----------
let causticT = 0;
const motes = [];   // 海洋雪: 缓慢上浮的微粒, 增强下潜/上升的深度感
function makeMote(y) {
  const depth = Math.random();
  return {
    x: Math.random()*W, y,
    r: 0.6 + depth*2.4, v: 5 + depth*26,
    a: 0.05 + depth*0.22,
    drift: (Math.random()-0.5)*0.7, ph: Math.random()*Math.PI*2
  };
}
function seedMotes() { motes.length = 0; for (let i=0;i<100;i++) motes.push(makeMote(Math.random()*H)); }

function drawBackground(dt) {
  causticT += dt;
  // 深海竖直渐变 (上层微光 → 深渊黑暗)
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#0a557d');
  bg.addColorStop(0.35, '#063250');
  bg.addColorStop(0.7,  '#041f38');
  bg.addColorStop(1,    '#010a16');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // 顶部透入的光束 (god rays)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i=0;i<5;i++) {
    const cx = W*(0.12 + 0.19*i) + Math.sin(causticT*0.25 + i)*50;
    const w = 55 + i*12;
    const grad = ctx.createLinearGradient(cx, 0, cx + w, H*0.9);
    grad.addColorStop(0, 'rgba(150,230,255,0.09)');
    grad.addColorStop(1, 'rgba(150,230,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx + w, 0);
    ctx.lineTo(cx + w*2.2, H); ctx.lineTo(cx - w*1.2, H);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // 海洋雪: 微粒持续缓缓上浮
  if (!motes.length) seedMotes();
  for (const m of motes) {
    m.y -= m.v*dt; m.ph += dt; m.x += Math.sin(m.ph)*m.drift;
    if (m.y < -4) Object.assign(m, makeMote(H + 4));
    ctx.globalAlpha = m.a;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    ctx.fillStyle = '#cdeeff'; ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 顶部亮光
  const tv = ctx.createLinearGradient(0, 0, 0, H*0.32);
  tv.addColorStop(0, 'rgba(120,220,255,0.12)');
  tv.addColorStop(1, 'rgba(120,220,255,0)');
  ctx.fillStyle = tv; ctx.fillRect(0, 0, W, H*0.32);
  // 底部深渊暗角
  const dv = ctx.createLinearGradient(0, H*0.55, 0, H);
  dv.addColorStop(0, 'rgba(1,10,22,0)');
  dv.addColorStop(1, 'rgba(0,5,12,0.9)');
  ctx.fillStyle = dv; ctx.fillRect(0, H*0.55, W, H*0.45);
}

// ---------- HUD ----------
function fmtTime(s){ const m=Math.floor(s/60), ss=Math.floor(s%60); return m+':'+String(ss).padStart(2,'0'); }
function updateHUD() {
  document.getElementById('score-value').textContent = state.score;
  document.getElementById('combo-value').textContent = state.combo;
}

// ---------- 主循环 ----------
function loop(now) {
  if (!state.running) return;
  const dt = Math.min(0.05, (now - state.lastFrame)/1000) || 0;
  state.lastFrame = now;

  ctx.clearRect(0,0,W,H);
  drawBackground(dt);
  updateAmbient(dt);

  // update
  updateBubble(dt);
  checkNotes();
  updateCamera(dt);
  for (const n of notes) { if (n.glow > 0) n.glow -= dt*1.5; if (n.shakeT > 0) n.shakeT -= dt; }
  updateParticles(dt);

  // draw (世界内容随摄像机上升)
  drawAmbient();
  drawTrack();
  drawNotes();
  drawBubble();
  drawParticles();

  document.getElementById('time-value').textContent = fmtTime(audioEl.currentTime);

  requestAnimationFrame(loop);
}

// 连击超时: 每隔一段没命中就清零
setInterval(() => {
  if (!state.running) return;
  if (state._lastHits === state.hits) { state.combo = 0; updateHUD(); }
  state._lastHits = state.hits;
}, 2500);

// ---------- 开始 / 结束 ----------
async function startGame() {
  if (!audioCtx) setupAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  if (!LYRICS.length) await loadLyrics();
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  // reset
  buildNotes();
  particles.length = 0; ambient.length = 0;
  resetBubble();
  Object.assign(state, { running:true, score:0, combo:0, maxCombo:0, hits:0, _lastHits:0 });
  updateHUD();
  audioEl.currentTime = 0;
  try { await audioEl.play(); } catch(e){ console.warn('播放失败', e); }
  state.lastFrame = performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  state.running = false;
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('final-combo').textContent = state.maxCombo;
  document.getElementById('final-hits').textContent = state.hits;
  document.getElementById('end-overlay').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// 窗口尺寸变化时重新摆位歌词
window.addEventListener('resize', () => { if (notes.length) layoutNotes(); motes.length = 0; });
</script>
