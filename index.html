<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旋律阶梯 · 小球跳跳 · 黑色毛衣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  body {
    background: linear-gradient(180deg, #1a1030 0%, #2a1a4a 40%, #14284a 75%, #071322 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #game-wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }

  #hud {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 26px; pointer-events: none; z-index: 5;
    color: #f0eaff; text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  .hud-box { background: rgba(30,18,60,.42); border:1px solid rgba(170,140,255,.28);
    backdrop-filter: blur(4px); border-radius: 14px; padding: 10px 18px; }
  .hud-label { font-size: 12px; letter-spacing: 2px; opacity:.7; }
  .hud-value { font-size: 26px; font-weight: 700; }
  #steps-value { color:#ffd67a; }

  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(50,30,90,.75), rgba(14,8,30,.94));
    color: #f0eaff; text-align: center; gap: 22px;
  }
  .overlay.hidden { display: none; }
  .title { font-size: 44px; font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(90deg,#ffd67a,#ff9ecb,#a98bff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 30px rgba(255,158,203,.3); }
  .subtitle { font-size: 16px; opacity: .8; max-width: 560px; line-height: 1.8; }
  .btn {
    pointer-events: auto; cursor: pointer;
    padding: 14px 46px; font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: #24123a; border: none; border-radius: 40px;
    background: linear-gradient(135deg,#ffd67a,#ff9ecb);
    box-shadow: 0 10px 30px rgba(255,158,203,.4); transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(255,158,203,.6); }
  .hint { font-size: 13px; opacity: .55; }
  .final-stat { font-size: 20px; opacity:.9; }
  .final-stat b { color:#ffd67a; font-size: 28px; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">STEPS 台阶</div>
      <div class="hud-value" id="steps-value">0</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">HEIGHT 高度</div>
      <div class="hud-value" id="height-value">0m</div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">TIME 进度</div>
      <div class="hud-value" id="time-value">0:00</div>
    </div>
  </div>

  <div class="overlay" id="start-overlay">
    <div class="title">旋律阶梯 · 小球跳跳</div>
    <div class="subtitle">
      随着《黑色毛衣》的旋律，每一个节拍都会生成一级新的台阶，<br>
      小球跟着节奏一跳一跳地向上攀登，镜头一路跟随向上。
    </div>
    <button class="btn" id="start-btn">开始</button>
    <div class="hint">建议戴上耳机 · 台阶随鼓点/重音实时生成</div>
  </div>

  <div class="overlay hidden" id="end-overlay">
    <div class="title">登顶结束</div>
    <div class="final-stat">攀登台阶 <b id="final-steps">0</b></div>
    <div class="final-stat">到达高度 <b id="final-height">0m</b></div>
    <button class="btn" id="restart-btn">再来一次</button>
  </div>
</div>

<script>
/* ============================================================
   旋律阶梯 · 小球跳跳
   实时音频节拍检测 → 逐级生成阶梯 → 小球随节奏抛物线上跳 → 镜头跟随
   ============================================================ */

// ---------- Canvas ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 音频 + 节拍检测 ----------
let audioCtx, analyser, freqData, sourceNode, audioEl;
let energyHistory = [];              // 近期低频能量历史 (用于自适应阈值)
const HISTORY_LEN = 43;              // ~约1秒的帧
let beatCooldown = 0;                // 防止同一鼓点重复触发

function setupAudio() {
  audioEl = new Audio('heisemaoyi.mp3');
  audioEl.crossOrigin = 'anonymous';
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.6;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioEl.addEventListener('ended', endGame);
}

// 计算低频(鼓/重拍)能量, 与历史均值比较, 返回本帧是否为一个节拍及其强度
function detectBeat(dt) {
  analyser.getByteFrequencyData(freqData);
  // 低频段: 前 ~1/8 频段主要是低音鼓/贝斯
  const bassBins = Math.floor(freqData.length * 0.12);
  let sum = 0;
  for (let i = 0; i < bassBins; i++) sum += freqData[i] * freqData[i];
  const energy = sum / bassBins;

  energyHistory.push(energy);
  if (energyHistory.length > HISTORY_LEN) energyHistory.shift();
  const avg = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;

  // 方差 -> 自适应灵敏度 (音乐动态大时阈值更宽松)
  let varSum = 0;
  for (const e of energyHistory) varSum += (e - avg) * (e - avg);
  const variance = varSum / energyHistory.length;
  const thresholdMul = -0.0000015 * variance + 1.45;

  beatCooldown -= dt;
  let beat = false, strength = 0;
  if (energy > avg * Math.max(1.28, thresholdMul) && beatCooldown <= 0 && energyHistory.length >= 12) {
    beat = true;
    strength = Math.min(1.6, energy / (avg + 1));
    beatCooldown = 0.24;             // 最短两拍间隔, 避免过密
  }
  // 持续声音强度: 能量高于均值的连续程度 (驱动平台上滚动)
  const sustain = energyHistory.length >= 12
    ? Math.max(0, Math.min(1.5, energy / (avg + 1) - 1.02))
    : 0;
  return { beat, strength, energy, sustain };
}

// 落地音效 (合成短促 "叮/咚")
function playStepSound(strength) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  const base = 380 + Math.random() * 260 + strength * 120;
  osc.frequency.setValueAtTime(base, t);
  osc.frequency.exponentialRampToValueAtTime(base * 0.5, t + 0.13);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18 * (0.5 + strength), t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.22);
}

// ---------- 世界 / 常量 ----------
const STEP_W = 96;         // 每级台阶水平跨度 (世界像素)
const STEP_H = 62;         // 每级台阶垂直高度
const STAIR_COLORS = ['#ffd67a','#ff9ecb','#a98bff','#7fd6ff','#8affc1'];

// ---------- 阶梯 ----------
const stairs = [];         // {ix, iy, x, y, w, h, color, born, dir}
let stairDir = 1;          // 当前生成方向 (1向右, -1向左), 到达边界翻转形成 Z 字
let boundCount = 0;        // 当前方向已连续走的级数

function resetStairs() {
  stairs.length = 0;
  stairDir = 1; boundCount = 0;
  // 起始平台
  addStair(true);
}

// 世界坐标: y 向上为负. 台阶顶面用于小球落脚
function addStair(isFirst) {
  let ix, iy;
  if (isFirst) {
    ix = 0; iy = 0;
  } else {
    const last = stairs[stairs.length - 1];
    // Z 字形: 走若干级后翻转方向, 保证不跑出镜头水平范围
    boundCount++;
    const maxRun = 3;
    if (boundCount >= maxRun) { stairDir *= -1; boundCount = 0; }
    ix = last.ix + stairDir;
    iy = last.iy + 1;               // 每级都升高
  }
  const s = {
    ix, iy,
    x: ix * STEP_W,
    y: -iy * STEP_H,
    w: STEP_W * 0.92,
    h: STEP_H,
    color: STAIR_COLORS[stairs.length % STAIR_COLORS.length],
    born: 0,                        // 生长动画进度
  };
  stairs.push(s);
  return s;
}

// ---------- 小球 ----------
const ball = {
  x: 0, y: 0, r: 20,
  targetIdx: 0,                     // 目标台阶索引
  jumping: false,
  jt: 0, jdur: 0.32,
  fromX: 0, fromY: 0, toX: 0, toY: 0,
  squash: 0,                        // 落地压扁
  rollVel: 0,                       // 平台上滚动速度 (世界像素/秒)
  spin: 0,                          // 自转角度 (滚动视觉)
  trail: [],
};

function resetBall() {
  const s0 = stairs[0];
  ball.x = s0.x; ball.y = s0.y - ball.r;
  ball.targetIdx = 0;
  ball.jumping = false; ball.jt = 0; ball.squash = 0;
  ball.rollVel = 0; ball.spin = 0;
  ball.trail.length = 0;
}

// 命令小球跳到某级台阶
function jumpToStair(idx) {
  const s = stairs[idx];
  if (!s) return;
  ball.fromX = ball.x; ball.fromY = ball.y;
  ball.toX = s.x; ball.toY = s.y - ball.r;
  ball.jt = 0;
  // 跳跃时长随水平/垂直跨度略变
  ball.jdur = 0.26 + Math.min(0.18, Math.abs(s.iy - stairs[ball.targetIdx].iy) * 0.05);
  ball.jumping = true;
  ball.targetIdx = idx;
}

function updateBall(dt, sustain) {
  if (ball.jumping) {
    ball.jt += dt;
    let p = ball.jt / ball.jdur;
    if (p >= 1) {
      p = 1; ball.jumping = false;
      ball.squash = 1;              // 落地压扁反馈
      ball.rollVel = 0;             // 落地后从平台中心重新起步
      playStepSound(0.8);
      spawnLandFx(ball.toX, ball.toY + ball.r);
    }
    // 抛物线插值: 水平线性, 垂直加一个上抛弧
    const arc = Math.sin(p * Math.PI) * (60 + Math.abs(ball.toX - ball.fromX) * 0.35);
    ball.x = ball.fromX + (ball.toX - ball.fromX) * p;
    ball.y = ball.fromY + (ball.toY - ball.fromY) * p - arc;
    // 空中也自转
    ball.spin += (ball.toX - ball.fromX >= 0 ? 1 : -1) * dt * 6;
  } else {
    // 停在平台上: 若有持续声音, 沿平台朝行进方向滚动一段
    const s = stairs[ball.targetIdx];
    if (s) {
      const half = s.w * 0.5 - ball.r;
      if (sustain > 0.12) {
        ball.rollVel += stairDir * (70 + sustain * 300) * dt;
      }
      ball.rollVel *= Math.max(0, 1 - dt * 2.2);      // 摩擦衰减
      ball.x += ball.rollVel * dt;
      const minX = s.x - half, maxX = s.x + half;
      if (ball.x < minX) { ball.x = minX; ball.rollVel *= -0.3; }
      if (ball.x > maxX) { ball.x = maxX; ball.rollVel *= -0.3; }
      ball.y = s.y - ball.r;                          // 锁定在平台顶面
      ball.spin += (ball.rollVel / ball.r) * dt;      // 滚动自转
    }
  }
  // 压扁恢复
  ball.squash += (0 - ball.squash) * Math.min(1, dt * 9);
  // 拖尾
  ball.trail.push({ x: ball.x, y: ball.y, t: 0 });
  if (ball.trail.length > 16) ball.trail.shift();
  for (const p of ball.trail) p.t += dt;
}

function drawBall() {
  // 拖尾
  for (let i = 0; i < ball.trail.length; i++) {
    const p = ball.trail[i];
    const a = (i / ball.trail.length) * 0.35;
    const rr = ball.r * (0.4 + i / ball.trail.length * 0.5);
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(p.x + camX, p.y - cam.y, rr, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd67a'; ctx.fill();
  }
  ctx.globalAlpha = 1;

  const x = ball.x + camX, y = ball.y - cam.y, r = ball.r;
  // 压扁形变
  const sq = ball.squash;
  const sx = 1 + sq * 0.4, sy = 1 - sq * 0.4;
  ctx.save();
  ctx.translate(x, y + (r * sq * 0.4)); ctx.scale(sx, sy); ctx.translate(-x, -(y + (r * sq * 0.4)));
  const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  g.addColorStop(0, 'rgba(255,255,255,0.98)');
  g.addColorStop(0.3, '#ffe9a8');
  g.addColorStop(1, '#ff9ecb');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = g; ctx.shadowColor = '#ffbf6a'; ctx.shadowBlur = 28; ctx.fill();
  ctx.shadowBlur = 0;
  // 高光
  ctx.beginPath(); ctx.arc(x - r*0.32, y - r*0.32, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
  // 旋转标记 (体现滚动)
  const mx = x + Math.cos(ball.spin) * r * 0.5;
  const my = y + Math.sin(ball.spin) * r * 0.5;
  ctx.beginPath(); ctx.arc(mx, my, r * 0.14, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,110,175,0.75)'; ctx.fill();
  ctx.restore();
}

// ---------- 摄像机 (跟随小球, x + y) ----------
const cam = { x: 0, y: 0 };
function updateCamera(dt) {
  const targetY = ball.y - H * 0.62;      // 小球保持在屏幕偏下
  cam.y += (targetY - cam.y) * Math.min(1, dt * 5);
  // x 方向: 让世界内容水平居中于小球
  camX += ((W / 2 - ball.x) - camX) * Math.min(1, dt * 5);
}
let camX = 0;   // 世界->屏幕的水平平移 (screenX = worldX + camX)

// ---------- 落地特效 ----------
const particles = [];
const rings = [];
function spawnLandFx(wx, wy) {
  for (let i = 0; i < 16; i++) {
    const ang = -Math.PI + Math.random() * Math.PI;   // 向上半圈溅射
    const spd = 80 + Math.random() * 220;
    particles.push({
      x: wx, y: wy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 0.4 + Math.random() * 0.4, t: 0, r: 1.5 + Math.random() * 3,
      color: STAIR_COLORS[(Math.random() * STAIR_COLORS.length) | 0]
    });
  }
  rings.push({ x: wx, y: wy, r: 4, max: 46, t: 0, life: 0.4 });
  fx.shake = 6;
}
function updateFx(dt) {
  for (const p of particles) { p.t += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 400*dt; }
  for (let i=particles.length-1;i>=0;i--) if (particles[i].t>particles[i].life) particles.splice(i,1);
  for (const r of rings) { r.t += dt; r.r += (r.max - r.r) * Math.min(1, dt*10); }
  for (let i=rings.length-1;i>=0;i--) if (rings[i].t > rings[i].life) rings.splice(i,1);
  if (fx.shake > 0) { fx.shake -= dt * 30; if (fx.shake < 0) fx.shake = 0; }
}
function drawFx() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t/p.life);
    ctx.beginPath(); ctx.arc(p.x + camX, p.y - cam.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  for (const r of rings) {
    const pr = r.t / r.life;
    ctx.globalAlpha = Math.max(0, 1 - pr) * 0.8;
    ctx.beginPath(); ctx.arc(r.x + camX, r.y - cam.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = '#fff2c8'; ctx.lineWidth = 3*(1-pr)+1;
    ctx.shadowColor = '#ffd67a'; ctx.shadowBlur = 12; ctx.stroke();
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}
const fx = { shake: 0 };

// ---------- 绘制阶梯 (带立体侧面) ----------
function drawStairs() {
  for (const s of stairs) {
    const sy = s.y - cam.y;
    if (sy < -120 || sy > H + 200) continue;
    const grow = Math.min(1, s.born);
    const sx = s.x + camX - s.w / 2;
    const topY = sy;
    const depth = 14;                 // 伪 3D 侧面深度
    const drawH = (H - topY) ;        // 侧柱延伸到画面底部, 形成"支柱"
    // 支柱 (半透明, 从台阶顶延伸向下)
    ctx.globalAlpha = 0.14 * grow;
    ctx.fillStyle = s.color;
    ctx.fillRect(sx, topY, s.w, Math.max(0, drawH));
    ctx.globalAlpha = 1;
    // 台阶侧面 (立体)
    ctx.fillStyle = shade(s.color, -0.35);
    ctx.beginPath();
    ctx.moveTo(sx, topY);
    ctx.lineTo(sx + depth, topY + depth);
    ctx.lineTo(sx + s.w + depth, topY + depth);
    ctx.lineTo(sx + s.w, topY);
    ctx.closePath(); ctx.fill();
    // 台阶顶面
    const gh = 12 * grow;
    const g = ctx.createLinearGradient(sx, topY - gh, sx, topY + 6);
    g.addColorStop(0, shade(s.color, 0.25));
    g.addColorStop(1, s.color);
    ctx.fillStyle = g;
    roundRect(sx, topY - 8 * grow, s.w, 12 * grow + 2, 5);
    ctx.shadowColor = s.color; ctx.shadowBlur = 16 * grow; ctx.fill();
    ctx.shadowBlur = 0;
    // 顶面高光线
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.5*grow) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx+4, topY - 6*grow); ctx.lineTo(sx+s.w-4, topY - 6*grow); ctx.stroke();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
// 颜色明暗调节
function shade(hex, amt) {
  const c = hex.replace('#','');
  let r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  r = Math.max(0, Math.min(255, Math.round(r + 255*amt)));
  g = Math.max(0, Math.min(255, Math.round(g + 255*amt)));
  b = Math.max(0, Math.min(255, Math.round(b + 255*amt)));
  return `rgb(${r},${g},${b})`;
}

// ---------- 背景 ----------
const bgMotes = [];
function seedMotes() { bgMotes.length = 0; for (let i=0;i<80;i++) bgMotes.push(makeMote(Math.random()*H)); }
function makeMote(y){ const d=Math.random(); return { x:Math.random()*W, y, r:0.6+d*2.2, v:6+d*22, a:0.05+d*0.2, ph:Math.random()*6.28, drift:(Math.random()-0.5)*0.6 }; }
let bgT = 0;
function drawBackground(dt, level) {
  bgT += dt;
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1030');
  bg.addColorStop(0.4, '#2a1a4a');
  bg.addColorStop(0.75, '#14284a');
  bg.addColorStop(1, '#071322');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  // 随音乐律动的光晕
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.06 + level * 0.5;
  const rg = ctx.createRadialGradient(W/2, H*0.4, 40, W/2, H*0.4, W*0.7);
  rg.addColorStop(0, `rgba(180,140,255,${pulse})`);
  rg.addColorStop(1, 'rgba(180,140,255,0)');
  ctx.fillStyle = rg; ctx.fillRect(0,0,W,H);
  ctx.restore();
  // 漂浮微粒
  if (!bgMotes.length) seedMotes();
  for (const m of bgMotes) {
    m.y -= m.v*dt; m.ph += dt; m.x += Math.sin(m.ph)*m.drift;
    if (m.y < -4) Object.assign(m, makeMote(H+4));
    ctx.globalAlpha = m.a;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    ctx.fillStyle = '#e6d8ff'; ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- 状态 ----------
const state = { running:false, lastFrame:0, steps:0, level:0 };

function updateHUD() {
  document.getElementById('steps-value').textContent = state.steps;
  const top = stairs.length ? stairs[stairs.length-1].iy : 0;
  document.getElementById('height-value').textContent = Math.round(top * STEP_H / 20) + 'm';
}

// ---------- 主循环 ----------
function loop(now) {
  if (!state.running) return;
  const dt = Math.min(0.05, (now - state.lastFrame)/1000) || 0;
  state.lastFrame = now;

  // 节拍检测 -> 生成新台阶 + 命令小球起跳
  const { beat, strength, energy, sustain } = detectBeat(dt);
  state.level += (Math.min(1, energy / 12000) - state.level) * Math.min(1, dt*8);
  if (beat) {
    const s = addStair(false);
    s.color = STAIR_COLORS[state.steps % STAIR_COLORS.length];
    state.steps++;
    jumpToStair(stairs.length - 1);
    updateHUD();
  }
  // 台阶生长动画
  for (const s of stairs) if (s.born < 1) s.born += dt * 6;

  updateBall(dt, sustain);
  updateCamera(dt);
  updateFx(dt);

  ctx.clearRect(0,0,W,H);
  drawBackground(dt, state.level);

  ctx.save();
  if (fx.shake > 0) ctx.translate((Math.random()-0.5)*fx.shake, (Math.random()-0.5)*fx.shake);
  drawStairs();
  drawFx();
  drawBall();
  ctx.restore();

  document.getElementById('time-value').textContent = fmtTime(audioEl.currentTime);
  requestAnimationFrame(loop);
}
function fmtTime(s){ const m=Math.floor(s/60), ss=Math.floor(s%60); return m+':'+String(ss).padStart(2,'0'); }

// ---------- 开始 / 结束 ----------
async function startGame() {
  if (!audioCtx) setupAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  energyHistory = []; beatCooldown = 0;
  particles.length = 0; rings.length = 0; fx.shake = 0;
  Object.assign(state, { running:true, steps:0, level:0 });
  resetStairs();
  resetBall();
  cam.y = ball.y - H * 0.62; camX = W/2 - ball.x;
  updateHUD();
  audioEl.currentTime = 0;
  try { await audioEl.play(); } catch(e){ console.warn('播放失败', e); }
  state.lastFrame = performance.now();
  requestAnimationFrame(loop);
}
function endGame() {
  state.running = false;
  document.getElementById('final-steps').textContent = state.steps;
  const top = stairs.length ? stairs[stairs.length-1].iy : 0;
  document.getElementById('final-height').textContent = Math.round(top * STEP_H / 20) + 'm';
  document.getElementById('end-overlay').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
window.addEventListener('resize', () => { bgMotes.length = 0; });
</script>
