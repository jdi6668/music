<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>星空夜语 · 助眠音乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #02030a;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  canvas { display: block; width: 100%; height: 100%; position: fixed; inset: 0; }

  /* ---- 播放器卡片 ---- */
  #player {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 340px; padding: 36px 32px 30px; z-index: 10; text-align: center;
    background: rgba(10, 14, 30, 0.45);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(140, 170, 230, 0.12);
    border-radius: 24px;
    box-shadow: 0 8px 60px rgba(20, 30, 60, 0.4), 0 0 80px rgba(80, 100, 180, 0.08);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #player.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0.95); }

  /* 唱片 */
  #disc {
    width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 24px;
    background: conic-gradient(from 0deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
    position: relative;
    box-shadow: 0 0 30px rgba(80, 100, 180, 0.2), inset 0 0 20px rgba(0,0,0,0.6);
    animation: spin 20s linear infinite;
    animation-play-state: paused;
  }
  #disc.playing { animation-play-state: running; }
  #disc::before {
    content: ''; position: absolute; inset: 30px; border-radius: 50%;
    background: radial-gradient(circle, #2a2a4e 0%, #1a1a3e 60%, #0a0a1e 100%);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }
  #disc::after {
    content: ''; position: absolute; left: 50%; top: 50%;
    width: 12px; height: 12px; border-radius: 50%;
    background: #6bd6ff; transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(107, 214, 255, 0.6);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .song-title {
    color: #e0e8ff; font-size: 18px; font-weight: 600; letter-spacing: 2px;
    margin-bottom: 4px; text-shadow: 0 0 20px rgba(100, 130, 200, 0.3);
  }
  .song-sub {
    color: rgba(180, 200, 240, 0.4); font-size: 12px; letter-spacing: 3px;
    margin-bottom: 22px;
  }

  /* 进度条 */
  #track {
    width: 100%; height: 4px; background: rgba(100, 120, 180, 0.15);
    border-radius: 4px; overflow: hidden; cursor: pointer; margin-bottom: 8px;
  }
  #fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, #4a8fd6, #7b6cc4);
    box-shadow: 0 0 8px rgba(100, 130, 200, 0.4);
    transition: width 0.15s linear;
  }
  #times {
    display: flex; justify-content: space-between;
    color: rgba(180, 200, 240, 0.35); font-size: 11px; letter-spacing: 1px;
    margin-bottom: 22px;
  }

  /* 控制按钮 */
  #controls {
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }
  .ctrl-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(60, 80, 140, 0.15); color: rgba(200, 220, 255, 0.6);
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
  }
  .ctrl-btn:hover {
    background: rgba(80, 110, 180, 0.25); color: #d0dcff;
    transform: scale(1.08);
  }
  #playBtn {
    width: 60px; height: 60px; font-size: 22px;
    background: linear-gradient(135deg, #4a8fd6, #7b6cc4);
    color: #fff;
    box-shadow: 0 4px 24px rgba(80, 110, 180, 0.3);
  }
  #playBtn:hover {
    background: linear-gradient(135deg, #5a9fe6, #8b7cd4);
    box-shadow: 0 4px 32px rgba(100, 130, 200, 0.45);
    transform: scale(1.06);
  }

  /* 音量 */
  #volWrap {
    display: flex; align-items: center; gap: 8px;
    margin-top: 18px; justify-content: center;
  }
  #volIcon { color: rgba(180, 200, 240, 0.35); font-size: 14px; }
  #vol {
    width: 80px; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(100, 120, 180, 0.15); border-radius: 3px; outline: none;
  }
  #vol::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #6bd6ff; cursor: pointer; box-shadow: 0 0 6px rgba(107,214,255,0.4);
  }
  #vol::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: #6bd6ff; cursor: pointer; box-shadow: 0 0 6px rgba(107,214,255,0.4);
  }

  /* 歌词 */
  #lyric {
    position: fixed; left: 0; right: 0; bottom: 14%; text-align: center;
    color: #e8ecff; font-size: clamp(20px, 4.5vw, 38px); font-weight: 600; letter-spacing: 3px;
    padding: 0 24px; z-index: 6; pointer-events: none;
    opacity: 0; transform: translateY(16px) scale(0.97); filter: blur(5px);
    transition: opacity 0.9s ease, transform 0.9s ease, filter 0.9s ease;
    text-shadow: 0 0 22px rgba(140,170,240,0.5), 0 0 50px rgba(120,100,200,0.3);
  }
  #lyric.show { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  #lyricNext {
    position: fixed; left: 0; right: 0; bottom: 7%; text-align: center;
    color: rgba(200,215,255,0.35); font-size: clamp(13px, 2.8vw, 19px); letter-spacing: 2px;
    padding: 0 24px; z-index: 6; pointer-events: none;
    transition: opacity 0.7s ease;
  }

  /* 唤出提示 */
  #hint {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: rgba(180, 200, 240, 0.25); font-size: 12px; letter-spacing: 4px;
    z-index: 9; pointer-events: none; transition: opacity 0.5s ease;
  }
  #hint.fade { opacity: 0; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="player">
  <div id="disc"></div>
  <div class="song-title">黑色毛衣</div>
  <div class="song-sub">夜 深 了 · 好 梦</div>
  <div id="track"><div id="fill"></div></div>
  <div id="times"><span id="curTime">0:00</span><span id="durTime">0:00</span></div>
  <div id="controls">
    <button class="ctrl-btn" id="prevBtn">&#9664;&#9664;</button>
    <button class="ctrl-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn" id="nextBtn">&#9654;&#9654;</button>
  </div>
  <div id="volWrap">
    <span id="volIcon">&#128266;</span>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7" />
  </div>
</div>

<div id="lyricNext"></div>
<div id="lyric"></div>

<div id="hint">点 击 空 白 处 唤 出 播 放 器</div>

<audio id="audio" preload="auto" src="heisemaoyi.mp3" crossorigin="anonymous"></audio>

<script>
/* ============================================================
   星空夜语 —— 助眠音乐播放器
   流星雨背景 (随旋律律动) · 闪烁星空 · 月光 · 萤火虫 · 歌词
   ============================================================ */
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---- 星空 ---- */
const STAR_COLORS = ['#ffffff', '#cfe6ff', '#e8d8ff', '#ffe9b8', '#bfeaff'];
let stars = [];
function initStars() {
  stars = [];
  const n = Math.round((W * H) / 3500);
  for (let i = 0; i < n; i++) {
    const bright = Math.random();
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: bright > 0.95 ? 1.4 + Math.random() * 1.2 : Math.random() * 0.9 + 0.2,
      tw: Math.random() * Math.PI * 2,
      tws: 0.3 + Math.random() * 1.2,
      color: STAR_COLORS[(Math.random() * STAR_COLORS.length) | 0],
      flare: bright > 0.97
    });
  }
}
initStars();
addEventListener('resize', initStars);

/* ---- 音频分析 ---- */
const audioEl = document.getElementById('audio');
let actx, analyser, freqData, timeData, srcNode;
let audioReady = false;

function setupAudio() {
  if (audioReady) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  srcNode = actx.createMediaElementSource(audioEl);
  srcNode.connect(analyser);
  analyser.connect(actx.destination);
  audioReady = true;
}

function getEnergy() {
  if (!audioReady || audioEl.paused) return { bass: 0, mid: 0, treble: 0, overall: 0 };
  analyser.getByteFrequencyData(freqData);
  const bins = analyser.frequencyBinCount;
  let bass = 0, mid = 0, treble = 0;
  const bassEnd = Math.floor(bins * 0.08);
  const midEnd = Math.floor(bins * 0.3);
  for (let i = 0; i < bassEnd; i++) bass += freqData[i];
  for (let i = bassEnd; i < midEnd; i++) mid += freqData[i];
  for (let i = midEnd; i < bins; i++) treble += freqData[i];
  bass = bass / (bassEnd * 255);
  mid = mid / ((midEnd - bassEnd) * 255);
  treble = treble / ((bins - midEnd) * 255);
  return { bass, mid, treble, overall: (bass + mid + treble) / 3 };
}

/* ---- 流星 (随旋律律动) ---- */
const meteors = [];
let meteorTimer = 0;
let smoothBass = 0, smoothMid = 0, smoothTreble = 0;

function spawnMeteor(energy) {
  const fromLeft = Math.random() < 0.6;
  const startY = Math.random() * H * 0.45;
  // 速度随整体能量变化: 安静时慢, 高潮时快
  const baseSpeed = 180 + energy.overall * 520 + energy.bass * 200;
  const speed = baseSpeed + Math.random() * 80;
  const angle = 0.3 + Math.random() * 0.2;
  // 大小随低频和中频变化
  const width = 0.8 + energy.bass * 3.5 + energy.mid * 1.5 + Math.random() * 0.6;
  const len = 70 + energy.overall * 200 + energy.treble * 120 + Math.random() * 60;
  // 色相随频段变化: 低频偏蓝紫, 高频偏白金
  const hue = 200 + energy.mid * 80 + energy.treble * 60 + Math.random() * 30;
  meteors.push({
    x: fromLeft ? -80 : W + 80,
    y: startY,
    vx: (fromLeft ? 1 : -1) * speed * Math.cos(angle),
    vy: speed * Math.sin(angle),
    life: 0,
    max: 1.5 + Math.random() * 1.5 + energy.overall * 0.8,
    len: len,
    hue: hue,
    width: width,
    brightness: 0.5 + energy.overall * 0.5
  });
}

function updateMeteors(dt, energy) {
  // 平滑能量值
  smoothBass += (energy.bass - smoothBass) * 0.15;
  smoothMid += (energy.mid - smoothMid) * 0.15;
  smoothTreble += (energy.treble - smoothTreble) * 0.15;

  meteorTimer -= dt;
  // 生成频率随能量变化: 安静时稀疏, 高潮时密集
  const spawnInterval = Math.max(0.15, 2.8 - energy.overall * 2.5 - energy.bass * 1.0);
  if (meteorTimer <= 0) {
    spawnMeteor(energy);
    // 高能量时可能一次生成多颗
    if (energy.overall > 0.5 && Math.random() < energy.overall * 0.6) spawnMeteor(energy);
    if (energy.bass > 0.6 && Math.random() < 0.3) spawnMeteor(energy);
    meteorTimer = spawnInterval + Math.random() * 0.5;
  }
  for (const m of meteors) {
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.life += dt;
  }
  for (let i = meteors.length - 1; i >= 0; i--) {
    if (meteors[i].life > meteors[i].max) meteors.splice(i, 1);
  }
}

function drawMeteors() {
  ctx.globalCompositeOperation = 'lighter';
  for (const m of meteors) {
    const p = m.life / m.max;
    const a = Math.sin(Math.min(1, p) * Math.PI) * (0.6 + m.brightness * 0.4);
    const ang = Math.atan2(m.vy, m.vx);
    const tx = m.x - Math.cos(ang) * m.len;
    const ty = m.y - Math.sin(ang) * m.len;
    const g = ctx.createLinearGradient(m.x, m.y, tx, ty);
    g.addColorStop(0, `hsla(${m.hue}, 90%, 88%, ${a})`);
    g.addColorStop(0.3, `hsla(${m.hue}, 85%, 75%, ${a * 0.5})`);
    g.addColorStop(1, `hsla(${m.hue}, 80%, 60%, 0)`);
    ctx.strokeStyle = g;
    ctx.lineWidth = m.width;
    ctx.lineCap = 'round';
    ctx.shadowColor = `hsl(${m.hue}, 90%, 78%)`;
    ctx.shadowBlur = 8 + m.width * 4;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    // 头部亮点
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.width * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${m.hue}, 100%, 93%, ${a})`;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
}

/* ---- 萤火虫 ---- */
const fireflies = [];
function initFireflies() {
  fireflies.length = 0;
  const n = 25;
  for (let i = 0; i < n; i++) {
    fireflies.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 15,
      vy: (Math.random() - 0.5) * 10,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.0,
      r: 1 + Math.random() * 1.5
    });
  }
}
initFireflies();
addEventListener('resize', initFireflies);

function drawFireflies(dt) {
  const t = performance.now() / 1000;
  ctx.globalCompositeOperation = 'lighter';
  for (const f of fireflies) {
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.phase += dt * f.speed;
    // 缓慢游荡
    f.vx += (Math.random() - 0.5) * 8 * dt;
    f.vy += (Math.random() - 0.5) * 5 * dt;
    f.vx = Math.max(-20, Math.min(20, f.vx));
    f.vy = Math.max(-15, Math.min(15, f.vy));
    // 边界回绕
    if (f.x < -10) f.x = W + 10;
    if (f.x > W + 10) f.x = -10;
    if (f.y < -10) f.y = H + 10;
    if (f.y > H + 10) f.y = -10;
    const glow = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(f.phase));
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 6);
    g.addColorStop(0, `rgba(180, 220, 150, ${glow * 0.6})`);
    g.addColorStop(0.5, `rgba(150, 200, 120, ${glow * 0.15})`);
    g.addColorStop(1, 'rgba(100, 150, 80, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r * 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(200, 240, 170, ${glow * 0.8})`;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ---- 月亮 (缓慢漂移 + 旋律呼吸) ---- */
let moonAngle = 0;
function drawMoon(energy) {
  const t = performance.now() / 1000;
  // 缓慢沿弧线漂移: 从右上缓缓移向中上再回来
  moonAngle += 0.0003;
  const driftX = Math.cos(t * 0.03) * W * 0.06;
  const driftY = Math.sin(t * 0.025) * H * 0.04;
  const mx = W * 0.82 + driftX;
  const my = H * 0.18 + driftY;
  // 大小随低频呼吸
  const mr = Math.min(W, H) * (0.05 + energy.bass * 0.015);
  // 光晕亮度随旋律脉动
  const haloAlpha = 0.12 + energy.mid * 0.12 + energy.bass * 0.08;
  ctx.globalCompositeOperation = 'lighter';
  const halo = ctx.createRadialGradient(mx, my, mr * 0.8, mx, my, mr * (4 + energy.overall * 1.5));
  halo.addColorStop(0, `rgba(230, 235, 255, ${haloAlpha})`);
  halo.addColorStop(0.5, `rgba(200, 215, 255, ${haloAlpha * 0.35})`);
  halo.addColorStop(1, 'rgba(180, 200, 240, 0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(mx, my, mr * (4 + energy.overall * 1.5), 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  // 月球本体 (自转: 光源角度缓慢旋转)
  const lightAng = t * 0.08;
  const lx = mx - mr * 0.3 * Math.cos(lightAng);
  const ly = my - mr * 0.3 * Math.sin(lightAng);
  const g = ctx.createRadialGradient(lx, ly, mr * 0.1, mx, my, mr);
  g.addColorStop(0, '#f0f4ff');
  g.addColorStop(0.6, '#d0d8ee');
  g.addColorStop(1, '#a0aac8');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  // 环形山 (随自转旋转)
  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(t * 0.06);
  ctx.fillStyle = 'rgba(150, 160, 190, 0.2)';
  ctx.beginPath(); ctx.arc(mr * 0.2, -mr * 0.1, mr * 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-mr * 0.15, mr * 0.25, mr * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mr * 0.35, mr * 0.15, mr * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* ---- 背景 ---- */
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050818');
  g.addColorStop(0.4, '#080a1e');
  g.addColorStop(0.7, '#06081a');
  g.addColorStop(1, '#03040e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 远处微光
  ctx.globalCompositeOperation = 'lighter';
  const t = performance.now() / 1000;
  const clouds = [
    { h: 230, ox: -0.2, oy: -0.1 },
    { h: 260, ox: 0.15, oy: 0.2 },
    { h: 210, ox: 0.3, oy: -0.15 }
  ];
  for (let i = 0; i < clouds.length; i++) {
    const c = clouds[i];
    const bx = W * 0.5 + Math.cos(t * 0.05 + i * 2) * W * 0.1 + W * c.ox;
    const by = H * 0.5 + Math.sin(t * 0.04 + i * 1.5) * H * 0.08 + H * c.oy;
    const rad = Math.min(W, H) * 0.35;
    const rg = ctx.createRadialGradient(bx, by, 0, bx, by, rad);
    rg.addColorStop(0, `hsla(${c.h}, 70%, 50%, 0.04)`);
    rg.addColorStop(0.6, `hsla(${c.h}, 60%, 40%, 0.015)`);
    rg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.arc(bx, by, rad, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ---- 星星绘制 ---- */
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}

function drawStars(dt) {
  const t = performance.now() / 1000;
  ctx.globalCompositeOperation = 'lighter';
  for (const s of stars) {
    s.y -= dt * (0.3 + s.r * 0.2);
    if (s.y < -4) { s.y = H + 4; s.x = Math.random() * W; }
    const tw = 0.4 + 0.6 * Math.sin(t * s.tws + s.tw);
    const a = Math.min(1, (0.15 + tw * 0.55) * (0.5 + s.r * 0.3));
    const r = s.r * (1 + tw * 0.15);
    // 柔光晕
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 3.5);
    glow.addColorStop(0, hexA(s.color, a));
    glow.addColorStop(1, hexA(s.color, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 3.5, 0, Math.PI * 2);
    ctx.fill();
    // 星芯
    ctx.fillStyle = hexA(s.color, Math.min(1, a + 0.15));
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fill();
    // 亮星十字星芒
    if (s.flare) {
      const fl = (r + tw * 2) * 2.5;
      ctx.strokeStyle = hexA(s.color, a * 0.6);
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s.x - fl, s.y); ctx.lineTo(s.x + fl, s.y);
      ctx.moveTo(s.x, s.y - fl); ctx.lineTo(s.x, s.y + fl);
      ctx.stroke();
    }
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ---- 歌词 ---- */
let lyrics = [], curLyric = -1;
const lyricEl = document.getElementById('lyric');
const lyricNextEl = document.getElementById('lyricNext');

async function loadLyrics() {
  try {
    const text = await (await fetch('heisemaoyi.lrc')).text();
    const skip = ['词：', '曲：', '编曲', '制作', '人：', '和声', '混音', '母带', '监制'];
    const re = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\](.*)/;
    lyrics = text.split(/\r?\n/).map(l => {
      const m = l.match(re); if (!m) return null;
      const t = m[4].trim(); if (!t || skip.some(s => t.includes(s))) return null;
      const frac = m[3] ? parseInt(m[3].padEnd(3, '0'), 10) / 1000 : 0;
      return { time: +m[1] * 60 + +m[2] + frac, text: t };
    }).filter(Boolean).sort((a, b) => a.time - b.time);
  } catch (e) { lyrics = []; }
}

function updateLyrics(t) {
  if (!lyrics.length) return;
  let idx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (t >= lyrics[i].time) idx = i; else break;
  }
  if (idx !== curLyric) {
    curLyric = idx;
    setLyricText(idx >= 0 ? lyrics[idx].text : '');
    lyricNextEl.textContent = (idx + 1 < lyrics.length) ? lyrics[idx + 1].text : '';
  }
}

loadLyrics();

/* ---- 星星拼歌词特效 ---- */
const lyricCanvas = document.createElement('canvas');
const lyricCtx = lyricCanvas.getContext('2d');
const LYRIC_PARTICLE_COUNT = 2000;
let lyricParticles = [];
let lyricStarActive = false;
let lyricStarOpacity = 0;

function initLyricParticles() {
  lyricParticles = [];
  for (let i = 0; i < LYRIC_PARTICLE_COUNT; i++) {
    lyricParticles.push({
      x: Math.random() * W, y: Math.random() * H,
      hx: Math.random() * W, hy: Math.random() * H,
      tx: 0, ty: 0, hasTarget: false,
      tw: Math.random() * Math.PI * 2,
      tws: 0.5 + Math.random() * 1.5,
      r: 1.0 + Math.random() * 1.0,
      color: STAR_COLORS[(Math.random() * STAR_COLORS.length) | 0],
      formEase: 0.18,
      disperseEase: 0.015 + Math.random() * 0.015
    });
  }
}
initLyricParticles();

function getTextTargets(text) {
  if (!text) return [];
  const chars = [...text];
  let fontSize = Math.min(W * 0.12, H * 0.14, 78);
  const maxCharW = W * 0.7;
  lyricCtx.font = `600 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  let charW = lyricCtx.measureText('一').width;
  while (charW > maxCharW && fontSize > 24) {
    fontSize -= 2;
    lyricCtx.font = `600 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    charW = lyricCtx.measureText('一').width;
  }
  const lineH = Math.ceil(fontSize * 1.25);
  const tw = Math.ceil(charW) + 20;
  const th = lineH * chars.length;
  lyricCanvas.width = tw;
  lyricCanvas.height = th;
  lyricCtx.font = `600 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  lyricCtx.fillStyle = '#fff';
  lyricCtx.textBaseline = 'middle';
  lyricCtx.textAlign = 'center';
  for (let i = 0; i < chars.length; i++) {
    lyricCtx.fillText(chars[i], tw / 2, lineH * i + lineH / 2);
  }
  const imgData = lyricCtx.getImageData(0, 0, tw, th);
  const targets = [];
  const step = 3;
  for (let y = 0; y < th; y += step) {
    for (let x = 0; x < tw; x += step) {
      const idx = (y * tw + x) * 4;
      if (imgData.data[idx + 3] > 128) {
        targets.push({ x: x - tw / 2, y: y - th / 2 });
      }
    }
  }
  return targets;
}

function setLyricText(text) {
  if (!text) {
    for (const p of lyricParticles) p.hasTarget = false;
    lyricStarActive = false;
    return;
  }
  const targets = getTextTargets(text);
  if (!targets.length) {
    for (const p of lyricParticles) p.hasTarget = false;
    lyricStarActive = false;
    return;
  }
  for (let i = targets.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [targets[i], targets[j]] = [targets[j], targets[i]];
  }
  const cx = W / 2;
  const cy = H * 0.5;
  const count = Math.min(targets.length, lyricParticles.length);
  for (let i = 0; i < lyricParticles.length; i++) {
    if (i < count) {
      lyricParticles[i].tx = targets[i].x + cx;
      lyricParticles[i].ty = targets[i].y + cy;
      lyricParticles[i].hasTarget = true;
    } else {
      lyricParticles[i].hasTarget = false;
    }
  }
  lyricStarActive = true;
}

function drawLyricStars(dt) {
  const t = performance.now() / 1000;
  const targetOpacity = lyricStarActive ? 1 : 0;
  lyricStarOpacity += (targetOpacity - lyricStarOpacity) * 0.04;
  if (lyricStarOpacity < 0.01) return;
  ctx.globalCompositeOperation = 'lighter';
  for (const p of lyricParticles) {
    const targetX = p.hasTarget ? p.tx : p.hx;
    const targetY = p.hasTarget ? p.ty : p.hy;
    const ease = p.hasTarget ? p.formEase : p.disperseEase;
    p.x += (targetX - p.x) * ease;
    p.y += (targetY - p.y) * ease;
    const tw = 0.6 + 0.4 * Math.sin(t * p.tws + p.tw);
    const forming = p.hasTarget ? lyricStarOpacity : lyricStarOpacity * 0.2;
    const a = Math.min(1, (0.5 + tw * 0.4) * forming);
    const r = p.r * (1 + tw * 0.1);
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.5);
    glow.addColorStop(0, hexA(p.color, a * 0.8));
    glow.addColorStop(1, hexA(p.color, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = hexA(p.color, Math.min(1, a + 0.35));
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 1.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function lyricStarResize() {
  for (const p of lyricParticles) {
    p.hx = Math.random() * W;
    p.hy = Math.random() * H;
  }
  if (curLyric >= 0 && lyrics[curLyric]) {
    setLyricText(lyrics[curLyric].text);
  }
}
addEventListener('resize', lyricStarResize);

/* ---- 主循环 ---- */
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000) || 0;
  last = now;
  const energy = getEnergy();
  drawBackground();
  drawMoon(energy);
  drawStars(dt);
  drawLyricStars(dt);
  drawFireflies(dt);
  updateMeteors(dt, energy);
  drawMeteors();
  updateLyrics(audioEl.currentTime);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============================================================
   播放器逻辑
   ============================================================ */
const audio = document.getElementById('audio');
const disc = document.getElementById('disc');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const fill = document.getElementById('fill');
const track = document.getElementById('track');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const vol = document.getElementById('vol');
const player = document.getElementById('player');
const hint = document.getElementById('hint');

audio.volume = 0.7;

function fmt(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + String(ss).padStart(2, '0');
}

function togglePlay() {
  if (audio.paused) {
    if (!audioReady) setupAudio();
    if (actx && actx.state === 'suspended') actx.resume();
    audio.play().catch(e => console.warn(e));
  } else {
    audio.pause();
  }
}

audio.addEventListener('play', () => {
  playBtn.innerHTML = '&#10074;&#10074;';
  disc.classList.add('playing');
});
audio.addEventListener('pause', () => {
  playBtn.innerHTML = '&#9654;';
  disc.classList.remove('playing');
});
audio.addEventListener('loadedmetadata', () => {
  durTime.textContent = fmt(audio.duration);
});
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    curTime.textContent = fmt(audio.currentTime);
  }
});
audio.addEventListener('ended', () => {
  audio.currentTime = 0;
  audio.play();
});

playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
prevBtn.addEventListener('click', (e) => { e.stopPropagation(); audio.currentTime = 0; });
nextBtn.addEventListener('click', (e) => { e.stopPropagation(); audio.currentTime = Math.max(0, audio.currentTime - 10); });

track.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!audio.duration) return;
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

vol.addEventListener('input', (e) => {
  audio.volume = parseFloat(e.target.value);
});
vol.addEventListener('click', (e) => e.stopPropagation());

// 点击空白处唤出/隐藏播放器
let hideTimer;
document.addEventListener('click', (e) => {
  if (e.target.closest('#player')) return;
  player.classList.remove('hidden');
  hint.classList.add('fade');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!audio.paused) player.classList.add('hidden');
  }, 6000);
});

// 鼠标移动也唤出
document.addEventListener('mousemove', () => {
  player.classList.remove('hidden');
  hint.classList.add('fade');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!audio.paused) player.classList.add('hidden');
  }, 6000);
});

// 初始提示淡出
setTimeout(() => hint.classList.add('fade'), 5000);
</script>
