<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>水下气泡节奏音符游戏 · 黑色毛衣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  body {
    background: radial-gradient(circle at 50% 0%, #0a3d62 0%, #062c47 45%, #041a2e 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #game-wrap {
    position: relative;
    width: 100vw; height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 26px; pointer-events: none; z-index: 5;
    color: #eaf6ff; text-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .hud-box { background: rgba(6,44,71,.45); border:1px solid rgba(120,200,255,.25);
    backdrop-filter: blur(4px); border-radius: 14px; padding: 10px 18px; }
  .hud-label { font-size: 12px; letter-spacing: 2px; opacity:.7; }
  .hud-value { font-size: 26px; font-weight: 700; }
  #combo-value { color:#7fe0ff; }

  /* Start / End overlays */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(10,61,98,.75), rgba(4,26,46,.92));
    color: #eaf6ff; text-align: center; gap: 22px;
  }
  .overlay.hidden { display: none; }
  .title { font-size: 44px; font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(90deg,#7fe0ff,#c7f0ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 30px rgba(127,224,255,.35); }
  .subtitle { font-size: 16px; opacity: .8; max-width: 560px; line-height: 1.8; }
  .btn {
    pointer-events: auto; cursor: pointer;
    padding: 14px 46px; font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: #052033; border: none; border-radius: 40px;
    background: linear-gradient(135deg,#7fe0ff,#4fb8e6);
    box-shadow: 0 10px 30px rgba(79,184,230,.45); transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(79,184,230,.6); }
  .hint { font-size: 13px; opacity: .55; }
  .final-stat { font-size: 20px; opacity:.9; }
  .final-stat b { color:#7fe0ff; font-size: 28px; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">SCORE 得分</div>
      <div class="hud-value" id="score-value">0</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">COMBO 连击</div>
      <div class="hud-value" id="combo-value">0</div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">TIME 进度</div>
      <div class="hud-value" id="time-value">0:00</div>
    </div>
  </div>

  <div class="overlay" id="start-overlay">
    <div class="title">水下气泡节奏音符</div>
    <div class="subtitle">
      气泡从水底不断上浮，歌词《黑色毛衣》会随音乐逐句化作阶梯文字挂在水中。<br>
      当上浮的气泡撞到发光的歌词字块时会回弹并得分，跟着节拍击中更多字，冲击最高连击！
    </div>
    <button class="btn" id="start-btn">开始游戏</button>
    <div class="hint">建议戴上耳机 · 点击屏幕也能生成额外气泡</div>
  </div>

  <div class="overlay hidden" id="end-overlay">
    <div class="title">歌曲结束</div>
    <div class="final-stat">最终得分 <b id="final-score">0</b></div>
    <div class="final-stat">最高连击 <b id="final-combo">0</b></div>
    <div class="final-stat">命中字数 <b id="final-hits">0</b></div>
    <button class="btn" id="restart-btn">再玩一次</button>
  </div>
</div>

<script>
/* ============================================================
   水下气泡节奏音符游戏 — 方案A
   音频解析(节拍) → 阶梯式歌词文字轨道 → 水下气泡物理 → 碰撞回弹得分
   ============================================================ */

// ---------- 歌词时间轴 (黑色毛衣 - 周杰伦) [秒, 文本] ----------
// 时间戳为近似值, 用于按音乐进度生成阶梯文字
const LYRICS = [
  [6.0,  "一件黑色毛衣"],
  [10.0, "两个人的回忆"],
  [14.0, "雨过之后"],
  [16.5, "更难忘记"],
  [19.5, "忘记我还爱你"],
  [24.5, "你打的毛衣"],
  [28.5, "让我爱不释手"],
  [33.0, "送你的钻石"],
  [36.5, "此刻在我手"],
  [40.0, "心血来潮"],
  [42.5, "全部都锁在保险柜"],
  [48.0, "藏着你给的温柔"],
  [54.0, "在美的爱情"],
  [57.0, "我都有见识过"],
  [61.0, "很快乐"],
  [63.5, "在你身边度过"],
  [67.5, "以为你我会永久"],
  [72.0, "谁知道你早就想放手"],
  [78.0, "我送你的项链"],
  [82.0, "你说太沉重"],
  [86.0, "承受不起这段感情"],
  [92.0, "所以你精神外遇"],
  [98.0, "分手当天你却哭红了眼睛"],
  [106.0,"是我不懂得珍惜"],
  [112.0,"还是你不再爱我"],
  [118.0,"我用你送的毛衣"],
  [124.0,"温暖我自己"],
  [130.0,"一件黑色毛衣"],
  [134.0,"两个人的回忆"],
  [138.0,"雨过之后"],
  [140.5,"更难忘记"],
  [143.5,"忘记我还爱你"],
  [148.0,"你打的毛衣"],
  [152.0,"让我爱不释手"],
  [156.5,"送你的钻石"],
  [160.0,"此刻在我手"],
  [163.5,"心血来潮"],
  [166.0,"全部都锁在保险柜"],
  [171.5,"藏着你给的温柔"],
  [178.0,"雨下的越来越无情"],
  [184.0,"敲打我全部的记忆"],
  [190.0,"你说你也会舍不得"],
  [196.0,"离开我抱着我说"],
  [202.0,"你也会心痛的"],
];

// ---------- Canvas 初始化 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 游戏状态 ----------
const state = {
  running: false,
  score: 0,
  combo: 0,
  maxCombo: 0,
  hits: 0,
  lastFrame: 0,
  nextLyric: 0,
  beatCooldown: 0,
};

// ---------- 音频 ----------
let audioCtx, analyser, freqData, sourceNode, audioEl, gainNode;
let energyHistory = [];

function setupAudio() {
  audioEl = new Audio('heisemaoyi.mp3');
  audioEl.crossOrigin = 'anonymous';
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioEl.addEventListener('ended', endGame);
}

// 撞击音效 (合成)
function playHitSound(strength) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660 + Math.random()*400, t);
  osc.frequency.exponentialRampToValueAtTime(220, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.25 * (0.6 + strength), t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.26);
}

// ---------- 气泡 ----------
const bubbles = [];
const COLORS = ['#7fe0ff','#a6f0ff','#c7f0ff','#8fd6ff','#b3e5ff'];

class Bubble {
  constructor(x, r, boost) {
    this.x = x;
    this.y = H + r + 10;
    this.r = r;
    this.vx = (Math.random()-0.5) * 20;
    this.vy = -(40 + Math.random()*30) * (1 + (boost||0));
    this.buoyancy = 55 + Math.random()*40;   // 持续向上浮力
    this.drag = 0.9;                          // 水阻力
    this.wobblePhase = Math.random()*Math.PI*2;
    this.wobbleAmp = 12 + Math.random()*18;
    this.color = COLORS[(Math.random()*COLORS.length)|0];
    this.life = 0;
    this.dead = false;
    this.cooldown = 0; // 碰撞后短暂免碰
  }
  update(dt) {
    this.life += dt;
    // 浮力
    this.vy -= this.buoyancy * dt;
    // 左右水流扰动
    this.wobblePhase += dt * 2.2;
    this.vx += Math.sin(this.wobblePhase) * this.wobbleAmp * dt;
    // 水阻力 (减速)
    this.vx *= Math.pow(this.drag, dt*60/60);
    this.vy *= Math.pow(0.995, dt*60/60);
    // 位置
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.cooldown > 0) this.cooldown -= dt;
    // 边界
    if (this.x < this.r) { this.x = this.r; this.vx *= -0.6; }
    if (this.x > W - this.r) { this.x = W - this.r; this.vx *= -0.6; }
    if (this.y < -this.r*2) this.dead = true;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x - this.r*0.3, this.y - this.r*0.3, this.r*0.1, this.x, this.y, this.r);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.25, this.color + 'cc');
    g.addColorStop(1, this.color + '22');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
    // 高光
    ctx.beginPath();
    ctx.arc(this.x - this.r*0.32, this.y - this.r*0.32, this.r*0.22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();
    // 边缘
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(200,240,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function spawnBubble(boost) {
  const r = 14 + Math.random()*20;
  const x = 40 + Math.random()*(W-80);
  bubbles.push(new Bubble(x, r, boost));
  if (bubbles.length > 120) bubbles.shift();
}

// ---------- 阶梯歌词文字块 ----------
const lyricBlocks = [];
let stepIndex = 0;

class LyricBlock {
  constructor(text) {
    this.text = text;
    // 阶梯横向分层: 依次在竖轴不同高度、左右交错
    const layers = 6;
    const layer = stepIndex % layers;
    const topPad = H * 0.14, usable = H * 0.55;
    this.y = topPad + (usable / (layers-1)) * layer;
    // 左右交错的阶梯感
    ctx.font = '700 26px "Microsoft YaHei", sans-serif';
    this.w = ctx.measureText(text).width + 34;
    this.h = 46;
    const zig = (stepIndex % 2 === 0) ? -1 : 1;
    const cx = W/2 + zig * (W*0.16) + (Math.random()-0.5)*W*0.1;
    this.x = Math.max(20, Math.min(W - this.w - 20, cx - this.w/2));
    stepIndex++;
    this.appear = 0;
    this.life = 0;
    this.maxLife = 9.5;      // 停留时间
    this.dead = false;
    this.glow = 0;
    this.hp = Math.max(2, Math.round(text.length / 2)); // 需要撞几下
    this.shakeT = 0;
  }
  update(dt) {
    this.life += dt;
    this.appear = Math.min(1, this.appear + dt*3);
    if (this.glow > 0) this.glow -= dt*2;
    if (this.shakeT > 0) this.shakeT -= dt;
    if (this.life > this.maxLife || this.hp <= 0) {
      this.dead = true;
    }
  }
  draw() {
    const a = this.appear * (this.life > this.maxLife-1 ? Math.max(0,(this.maxLife-this.life)) : 1);
    let ox = 0, oy = 0;
    if (this.shakeT > 0) { ox = (Math.random()-0.5)*8; oy=(Math.random()-0.5)*8; }
    const x = this.x + ox, y = this.y + oy;
    ctx.save();
    ctx.globalAlpha = a;
    // 背景字块
    const grad = ctx.createLinearGradient(x, y, x, y+this.h);
    grad.addColorStop(0, `rgba(127,224,255,${0.22 + this.glow*0.5})`);
    grad.addColorStop(1, `rgba(79,184,230,${0.12 + this.glow*0.4})`);
    roundRect(x, y, this.w, this.h, 12);
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(127,224,255,'+(0.5+this.glow)+')';
    ctx.shadowBlur = 18 + this.glow*30;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = `rgba(200,240,255,${0.6})`;
    ctx.lineWidth = 1.5;
    roundRect(x, y, this.w, this.h, 12); ctx.stroke();
    // 文字
    ctx.font = '700 26px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f2fbff';
    ctx.fillText(this.text, x + this.w/2, y + this.h/2 + 1);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// ---------- 粒子 (命中特效) ----------
const particles = [];
function burst(x, y, color) {
  for (let i=0;i<10;i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*260,
      vy: (Math.random()-0.5)*260 - 60,
      life: 0.6 + Math.random()*0.3,
      t: 0, r: 2+Math.random()*3, color
    });
  }
}
function updateParticles(dt) {
  for (const p of particles) {
    p.t += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 120*dt;
  }
  for (let i=particles.length-1;i>=0;i--) if (particles[i].t>particles[i].life) particles.splice(i,1);
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t/p.life);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- 碰撞检测: 气泡 vs 文字块 ----------
function checkCollisions() {
  for (const b of bubbles) {
    if (b.cooldown > 0) continue;
    for (const blk of lyricBlocks) {
      if (blk.dead || blk.appear < 0.5) continue;
      // 圆 vs 矩形
      const nx = Math.max(blk.x, Math.min(b.x, blk.x + blk.w));
      const ny = Math.max(blk.y, Math.min(b.y, blk.y + blk.h));
      const dx = b.x - nx, dy = b.y - ny;
      if (dx*dx + dy*dy <= b.r*b.r) {
        // 命中: 气泡向下回弹
        b.vy = Math.abs(b.vy) * 0.9 + 60;   // 向下弹
        b.vx += (b.x - (blk.x+blk.w/2)) * 0.3;
        b.cooldown = 0.4;
        // 文字反馈
        blk.glow = 1; blk.shakeT = 0.18; blk.hp -= 1;
        // 计分
        const gain = 100 + state.combo * 5;
        state.score += gain;
        state.combo += 1;
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        state.hits += 1;
        playHitSound(Math.min(1, b.r/34));
        burst(b.x, b.y, b.color);
        updateHUD();
        break;
      }
    }
  }
}

// ---------- 音频节拍检测 → 生成气泡 ----------
function detectBeat(dt) {
  analyser.getByteFrequencyData(freqData);
  // 取低频能量 (鼓点)
  let energy = 0;
  const bass = Math.floor(freqData.length * 0.12);
  for (let i=0;i<bass;i++) energy += freqData[i];
  energy /= bass;
  energyHistory.push(energy);
  if (energyHistory.length > 43) energyHistory.shift();
  const avg = energyHistory.reduce((a,c)=>a+c,0)/energyHistory.length;

  state.beatCooldown -= dt;
  if (energy > avg * 1.35 && energy > 60 && state.beatCooldown <= 0) {
    const strength = Math.min(1, (energy - avg)/avg);
    spawnBubble(strength);
    if (strength > 0.6) spawnBubble(strength*0.5);
    state.beatCooldown = 0.14;
  }
  // 持续微量气泡, 保证水底一直有气泡上浮
  if (Math.random() < dt * 3) spawnBubble(0);
}

// ---------- 歌词生成 (按音乐进度) ----------
function updateLyrics() {
  const t = audioEl.currentTime;
  while (state.nextLyric < LYRICS.length && LYRICS[state.nextLyric][0] <= t) {
    lyricBlocks.push(new LyricBlock(LYRICS[state.nextLyric][1]));
    state.nextLyric++;
  }
}

// ---------- 水下环境背景 ----------
let causticT = 0;
function drawBackground(dt) {
  causticT += dt;
  // 光柱
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i=0;i<4;i++) {
    const bx = (W/4)*i + Math.sin(causticT*0.3+i)*40 + W*0.1;
    const grad = ctx.createLinearGradient(bx, 0, bx+120, H);
    grad.addColorStop(0, 'rgba(127,224,255,0.10)');
    grad.addColorStop(1, 'rgba(127,224,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(bx, 0); ctx.lineTo(bx+90,0); ctx.lineTo(bx+200,H); ctx.lineTo(bx-40,H);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 底部水草/暗部
  const bg = ctx.createLinearGradient(0, H*0.7, 0, H);
  bg.addColorStop(0, 'rgba(4,26,46,0)');
  bg.addColorStop(1, 'rgba(2,15,28,0.7)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, H*0.7, W, H*0.3);
}

// ---------- HUD ----------
function fmtTime(s){ const m=Math.floor(s/60), ss=Math.floor(s%60); return m+':'+String(ss).padStart(2,'0'); }
function updateHUD() {
  document.getElementById('score-value').textContent = state.score;
  document.getElementById('combo-value').textContent = state.combo;
}

// ---------- 主循环 ----------
function loop(now) {
  if (!state.running) return;
  const dt = Math.min(0.05, (now - state.lastFrame)/1000) || 0;
  state.lastFrame = now;

  ctx.clearRect(0,0,W,H);
  drawBackground(dt);

  detectBeat(dt);
  updateLyrics();

  // update
  for (const b of bubbles) b.update(dt);
  for (const blk of lyricBlocks) blk.update(dt);
  updateParticles(dt);
  checkCollisions();

  // 若气泡长时间没撞到东西不清连击, 这里连击断裂由超时处理
  // draw
  for (const blk of lyricBlocks) blk.draw();
  for (const b of bubbles) b.draw();
  drawParticles();

  // cleanup
  for (let i=bubbles.length-1;i>=0;i--) if (bubbles[i].dead) bubbles.splice(i,1);
  for (let i=lyricBlocks.length-1;i>=0;i--) if (lyricBlocks[i].dead) lyricBlocks.splice(i,1);

  document.getElementById('time-value').textContent = fmtTime(audioEl.currentTime);

  requestAnimationFrame(loop);
}

// 连击超时: 每隔一段没命中就清零
setInterval(() => {
  if (!state.running) return;
  if (state._lastHits === state.hits) { state.combo = 0; updateHUD(); }
  state._lastHits = state.hits;
}, 2500);

// ---------- 开始 / 结束 ----------
async function startGame() {
  if (!audioCtx) setupAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  // reset
  bubbles.length = 0; lyricBlocks.length = 0; particles.length = 0;
  stepIndex = 0; energyHistory = [];
  Object.assign(state, { running:true, score:0, combo:0, maxCombo:0, hits:0, nextLyric:0, beatCooldown:0, _lastHits:0 });
  updateHUD();
  audioEl.currentTime = 0;
  try { await audioEl.play(); } catch(e){ console.warn('播放失败', e); }
  state.lastFrame = performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  state.running = false;
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('final-combo').textContent = state.maxCombo;
  document.getElementById('final-hits').textContent = state.hits;
  document.getElementById('end-overlay').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// 点击生成额外气泡
canvas.addEventListener('pointerdown', (e) => {
  if (!state.running) return;
  const r = 16 + Math.random()*18;
  const b = new Bubble(e.clientX, r, 0.3);
  b.y = e.clientY; b.vy = -120;
  bubbles.push(b);
});
</script>
</body>
</html>
