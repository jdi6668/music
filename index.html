<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>旋律阶梯 · 小球跳跳</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .container {
                width: 90%;
                max-width: 1200px;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 20px;
                padding: 30px;
                box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
                border: 1px solid rgba(255, 255, 255, 0.18);
            }

            h1 {
                text-align: center;
                color: white;
                margin-bottom: 30px;
                font-size: 2.5em;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }

            .canvas-container {
                position: relative;
                width: 100%;
                height: 400px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 15px;
                margin-bottom: 20px;
                overflow: hidden;
            }

            #visualizer {
                width: 100%;
                height: 100%;
                display: block;
            }

            .controls {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
                margin-bottom: 20px;
            }

            button {
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid rgba(255, 255, 255, 0.3);
                color: white;
                padding: 12px 30px;
                border-radius: 50px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                transition: all 0.3s ease;
                backdrop-filter: blur(5px);
            }

            button:hover {
                background: rgba(255, 255, 255, 0.3);
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            }

            button:active {
                transform: translateY(0);
            }

            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .time-display {
                color: white;
                font-size: 18px;
                font-weight: bold;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            }

            .progress-container {
                width: 100%;
                height: 8px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 10px;
                overflow: hidden;
                cursor: pointer;
                margin-bottom: 20px;
            }

            .progress-bar {
                height: 100%;
                background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
                width: 0%;
                transition: width 0.1s linear;
                border-radius: 10px;
            }

            .info {
                text-align: center;
                color: rgba(255, 255, 255, 0.9);
                font-size: 14px;
                line-height: 1.6;
            }

            .frequency-bars {
                display: flex;
                align-items: flex-end;
                justify-content: space-around;
                height: 100px;
                gap: 2px;
                margin-top: 20px;
            }

            .bar {
                flex: 1;
                background: linear-gradient(to top, #00f2fe, #4facfe);
                border-radius: 3px 3px 0 0;
                transition: height 0.1s ease;
                min-height: 2px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🎵 旋律阶梯 · 小球跳跳 🎵</h1>
            
            <div class="canvas-container">
                <canvas id="visualizer"></canvas>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="controls">
                <button id="playBtn">▶️ 播放</button>
                <button id="pauseBtn" disabled>⏸️ 暂停</button>
                <button id="stopBtn" disabled>⏹️ 停止</button>
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
            </div>

            <div class="frequency-bars" id="frequencyBars"></div>

            <div class="info">
                <p>🎼 使用 Web Audio API 实时分析音频频率</p>
                <p>🎨 动态可视化展示旋律变化</p>
                <p>⚡ 小球随音乐节奏跳动</p>
            </div>
        </div>

        <script>
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            const timeDisplay = document.getElementById('timeDisplay');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');
            const frequencyBarsContainer = document.getElementById('frequencyBars');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            let audio = new Audio('heisemaoyi.mp3');
            let audioContext;
            let analyser;
            let dataArray;
            let bufferLength;
            let source;
            let isPlaying = false;
            let balls = [];

            const NUM_BARS = 32;
            for (let i = 0; i < NUM_BARS; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                frequencyBarsContainer.appendChild(bar);
            }
            const bars = document.querySelectorAll('.bar');

            class Ball {
                constructor(x, y, radius, color, frequency) {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.color = color;
                    this.frequency = frequency;
                    this.baseY = y;
                    this.velocity = 0;
                    this.gravity = 0.5;
                }

                update(amplitude) {
                    const jumpForce = amplitude * 0.3;
                    this.velocity -= jumpForce;
                    this.velocity += this.gravity;
                    this.y += this.velocity;

                    if (this.y > this.baseY) {
                        this.y = this.baseY;
                        this.velocity *= -0.7;
                    }

                    this.radius = 15 + amplitude * 0.1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function initAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);

                    source = audioContext.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);

                    const colors = ['#ff006e', '#fb5607', '#ffbe0b', '#8338ec', '#3a86ff', '#06ffa5'];
                    const numBalls = 8;
                    for (let i = 0; i < numBalls; i++) {
                        const x = (canvas.width / (numBalls + 1)) * (i + 1);
                        const y = canvas.height - 50;
                        const color = colors[i % colors.length];
                        balls.push(new Ball(x, y, 15, color, i));
                    }
                }
            }

            function visualize() {
                if (!isPlaying) return;

                requestAnimationFrame(visualize);

                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = canvas.width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height * 0.7;
                    
                    const hue = (i / bufferLength) * 360;
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    
                    x += barWidth;
                }

                balls.forEach((ball, index) => {
                    const freqIndex = Math.floor((index / balls.length) * bufferLength);
                    const amplitude = dataArray[freqIndex] || 0;
                    ball.update(amplitude);
                    ball.draw();
                });

                for (let i = 0; i < NUM_BARS && i < bufferLength; i++) {
                    const value = dataArray[Math.floor(i * bufferLength / NUM_BARS)];
                    const height = (value / 255) * 100;
                    bars[i].style.height = height + 'px';
                }
            }

            function updateTime() {
                if (!audio.duration) return;
                
                const currentMinutes = Math.floor(audio.currentTime / 60);
                const currentSeconds = Math.floor(audio.currentTime % 60);
                const durationMinutes = Math.floor(audio.duration / 60);
                const durationSeconds = Math.floor(audio.duration % 60);
                
                timeDisplay.textContent = `${currentMinutes}:${currentSeconds.toString().padStart(2, '0')} / ${durationMinutes}:${durationSeconds.toString().padStart(2, '0')}`;
                
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = progress + '%';
            }

            playBtn.addEventListener('click', () => {
                initAudio();
                audio.play();
                isPlaying = true;
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                visualize();
            });

            pauseBtn.addEventListener('click', () => {
                audio.pause();
                isPlaying = false;
                playBtn.disabled = false;
                pauseBtn.disabled = true;
            });

            stopBtn.addEventListener('click', () => {
                audio.pause();
                audio.currentTime = 0;
                isPlaying = false;
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                ctx.fillStyle = 'rgba(0, 0, 0, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            progressContainer.addEventListener('click', (e) => {
                const rect = progressContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percentage = x / rect.width;
                audio.currentTime = percentage * audio.duration;
            });

            audio.addEventListener('timeupdate', updateTime);

            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            });

            audio.addEventListener('error', (e) => {
                alert('无法加载音频文件 heisemaoyi.mp3，请确保文件在同一目录下！');
                console.error('Audio error:', e);
            });

            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            });
        </script>
    </body>
</html>
