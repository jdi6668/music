<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>沉浸律动 · 黑色毛衣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #03040a;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* 歌词 */
  #lyric {
    position: fixed; left: 0; right: 0; bottom: 12%; text-align: center;
    color: #fff; font-size: clamp(22px, 5vw, 44px); font-weight: 700; letter-spacing: 4px;
    padding: 0 20px; z-index: 6; pointer-events: none;
    opacity: 0; transform: translateY(18px) scale(.98); filter: blur(6px);
    transition: opacity 1s ease, transform 1s ease, filter 1s ease;
    text-shadow: 0 0 24px rgba(160,200,255,.6), 0 0 60px rgba(150,120,255,.35);
  }
  #lyric.show { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  #lyricNext {
    position: fixed; left: 0; right: 0; bottom: 6.5%; text-align: center;
    color: rgba(210,225,255,.42); font-size: clamp(14px, 3vw, 22px); letter-spacing: 3px;
    z-index: 6; pointer-events: none; transition: opacity .8s ease;
  }

  /* 底部进度 */
  #progress { position: fixed; left: 0; bottom: 0; height: 3px; width: 0%;
    background: linear-gradient(90deg, #6bd6ff, #b18cff, #ff9ecf); z-index: 7;
    box-shadow: 0 0 16px rgba(150,180,255,.8); transition: width .12s linear; }

  /* 控制条 (点击唤出) */
  #bar { position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 24px);
    display: flex; align-items: center; gap: 18px; padding: 12px 22px; z-index: 8;
    background: rgba(16,20,38,.5); backdrop-filter: blur(14px);
    border: 1px solid rgba(150,180,255,.18); border-radius: 40px;
    opacity: 0; pointer-events: none; transition: opacity .4s ease, transform .4s ease; }
  #bar.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  #bar button { width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, #6bd6ff, #b18cff); color: #08122a; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: transform .15s; }
  #bar button:hover { transform: scale(1.08); }
  #time { color: #cdddff; font-size: 13px; letter-spacing: 1px; min-width: 96px; text-align: center; }

  /* 启动层 */
  .overlay { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 26px; text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 42%, rgba(24,20,52,.6), rgba(3,4,10,.92)); }
  .overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 1.1s ease; }
  .title { font-size: clamp(30px, 8vw, 62px); font-weight: 800; letter-spacing: 6px;
    background: linear-gradient(90deg, #6bd6ff, #b18cff, #ff9ecf, #6bd6ff);
    background-size: 300% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: flow 6s linear infinite; text-shadow: 0 0 60px rgba(150,150,255,.25); }
  @keyframes flow { to { background-position: 300% 0; } }
  .sub { color: rgba(220,230,255,.75); font-size: 15px; line-height: 2; max-width: 460px; letter-spacing: 1px; }
  .play { cursor: pointer; width: 96px; height: 96px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #6bd6ff, #b18cff); color: #06122c; font-size: 34px;
    box-shadow: 0 0 50px rgba(130,160,255,.6); transition: transform .2s, box-shadow .2s;
    display: flex; align-items: center; justify-content: center; }
  .play:hover { transform: scale(1.07); box-shadow: 0 0 70px rgba(150,180,255,.85); }
  .play:disabled { opacity: .5; }
  .hint { color: rgba(200,215,255,.5); font-size: 13px; letter-spacing: 2px; }
  /* 水印 */
  #watermark { position: fixed; top: 18px; left: 22px; z-index: 9;
    color: rgba(200,215,255,.5); font-size: 15px; font-weight: 700; letter-spacing: 3px;
    pointer-events: none; text-shadow: 0 0 12px rgba(120,160,255,.4); }
</style>
</head>
<body>
<div id="watermark">By 震撼哥</div>
<div id="stage">
  <canvas id="cv"></canvas>
</div>
<div id="lyricNext"></div>
<div id="lyric"></div>
<div id="progress"></div>

<div id="bar">
  <button id="playPause">❚❚</button>
  <span id="time">0:00 / 0:00</span>
</div>

<div class="overlay" id="overlay">
  <div class="title">沉浸律动</div>
  <div class="sub">戴上耳机，让《黑色毛衣》的声波化作星云与光潮。<br>轻触屏幕唤出控制。</div>
  <button class="play" id="playBtn">▶</button>
  <div class="hint">点击开始 · 建议全屏体验</div>
</div>

<script>
/* =====================================================================
   沉浸律动 —— 实时音频可视化 (黑色毛衣)
   星云核心 · 径向频谱绽放 · 流动丝带 · 星尘漂浮 · 节拍涟漪 · 歌词渐显
   ===================================================================== */
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, CX = 0, CY = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  W = innerWidth; H = innerHeight; CX = W / 2; CY = H / 2;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 音频 ----------
const audio = new Audio('heisemaoyi.mp3');
audio.preload = 'auto';
let actx, analyser, freq, timeDomain, srcNode;
function setupAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  freq = new Uint8Array(analyser.frequencyBinCount);
  timeDomain = new Uint8Array(analyser.fftSize);
  srcNode = actx.createMediaElementSource(audio);
  srcNode.connect(analyser);
  analyser.connect(actx.destination);
}

// ---------- 星空 ----------
const STAR_COLORS = ['#ffffff','#cfe6ff','#ffd6ec','#ffe9b8','#dcc7ff','#bfeaff'];
const stars = [];
function initStars() {
  stars.length = 0;
  const n = Math.round((W * H) / 2600);        // 更密集的星海
  for (let i = 0; i < n; i++) {
    const bright = Math.random();
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      z: Math.random() * 0.9 + 0.1,             // 景深
      r: (bright > 0.92 ? 1.6 + Math.random() * 1.8 : Math.random() * 1.1 + 0.3),
      tw: Math.random() * Math.PI * 2,           // 闪烁相位
      tws: 0.6 + Math.random() * 2.4,            // 闪烁速度
      color: STAR_COLORS[(Math.random() * STAR_COLORS.length) | 0],
      flare: bright > 0.92                        // 亮星带十字星芒
    });
  }
}
initStars();
addEventListener('resize', initStars);

// ---------- 流星 ----------
const meteors = [];
let meteorTimer = 1.5;
function spawnMeteor() {
  const fromLeft = Math.random() < 0.5;
  const y = Math.random() * H * 0.5;
  meteors.push({
    x: fromLeft ? -60 : W + 60, y,
    vx: (fromLeft ? 1 : -1) * (420 + Math.random() * 320),
    vy: 180 + Math.random() * 160,
    life: 0, max: 1.1,
    len: 140 + Math.random() * 160,
    hue: 200 + Math.random() * 120
  });
}
function updateMeteors(dt) {
  meteorTimer -= dt;
  if (meteorTimer <= 0) { spawnMeteor(); meteorTimer = 2.2 + Math.random() * 4; }
  for (const m of meteors) { m.x += m.vx * dt; m.y += m.vy * dt; m.life += dt; }
  for (let i = meteors.length - 1; i >= 0; i--) if (meteors[i].life > meteors[i].max) meteors.splice(i, 1);
}
function drawMeteors() {
  ctx.globalCompositeOperation = 'lighter';
  for (const m of meteors) {
    const p = m.life / m.max;
    const a = Math.sin(Math.min(1, p) * Math.PI);   // 淡入淡出
    const ang = Math.atan2(m.vy, m.vx);
    const tx = m.x - Math.cos(ang) * m.len, ty = m.y - Math.sin(ang) * m.len;
    const g = ctx.createLinearGradient(m.x, m.y, tx, ty);
    g.addColorStop(0, `hsla(${m.hue}, 100%, 88%, ${a})`);
    g.addColorStop(1, 'hsla(0,0%,100%,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
    ctx.shadowColor = `hsl(${m.hue},100%,80%)`; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.beginPath(); ctx.arc(m.x, m.y, 2.2, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${m.hue},100%,92%,${a})`; ctx.fill();
  }
  ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
}

// ---------- 宇宙星球 ----------
// 大地的经纬块 (旋转时投影到球面, 形成自转的地球)
const CONTINENTS = [
  {u:0.05,v:-0.15,s:0.42},{u:0.12,v:0.25,s:0.30},{u:0.30,v:-0.35,s:0.26},
  {u:0.40,v:0.10,s:0.40},{u:0.55,v:-0.05,s:0.34},{u:0.62,v:0.35,s:0.24},
  {u:0.72,v:-0.30,s:0.30},{u:0.85,v:0.15,s:0.38},{u:0.92,v:-0.10,s:0.22}
];
const CLOUDS = [
  {u:0.10,v:0.05,s:0.30},{u:0.28,v:-0.25,s:0.24},{u:0.48,v:0.30,s:0.28},
  {u:0.66,v:-0.10,s:0.26},{u:0.80,v:0.20,s:0.22},{u:0.95,v:-0.30,s:0.20}
];
const planets = [
  { type:'earth',  ax:0.82, ay:0.74, r:0.12, spin:0.05,  bob:0.5, rot:0 },
  { type:'ringed', ax:0.16, ay:0.18, r:0.06, hue:42,     bob:0.35 },
  { type:'plain',  ax:0.90, ay:0.16, r:0.034, hue:14,    bob:0.6 },   // 火星
  { type:'plain',  ax:0.08, ay:0.82, r:0.028, hue:195,   bob:0.45 }   // 冰蓝
];
function updatePlanets(dt) {
  for (const p of planets) if (p.type === 'earth') p.rot = (p.rot + dt * p.spin) % 1;
}
function planetPos(p) {
  const t = performance.now() / 1000;
  const R = Math.min(W, H);
  return {
    x: p.ax * W + Math.sin(t * 0.06 + p.ay * 9) * 10,
    y: p.ay * H + Math.sin(t * 0.05 * p.bob + p.ax * 7) * 12,
    r: p.r * R
  };
}
function drawPlanets(dt, bass) {
  for (const p of planets) {
    const { x, y, r } = planetPos(p);
    if (p.type === 'earth') drawEarth(x, y, r, p.rot, bass);
    else drawPlanet(x, y, r, p.hue, p.type === 'ringed');
  }
}
function drawPlanet(cx, cy, r, hue, ring) {
  ctx.save();
  if (ring) {
    // 行星环
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(-0.5); ctx.scale(1, 0.32);
    ctx.strokeStyle = `hsla(${hue},70%,72%,0.5)`; ctx.lineWidth = r * 0.18;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.7, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `hsla(${hue},70%,60%,0.3)`; ctx.lineWidth = r * 0.10;
    ctx.beginPath(); ctx.arc(0, 0, r * 2.05, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  // 球体 (受光渐变)
  const g = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.1, cx, cy, r);
  g.addColorStop(0, `hsl(${hue},70%,72%)`);
  g.addColorStop(0.55, `hsl(${hue},65%,48%)`);
  g.addColorStop(1, `hsl(${hue},60%,14%)`);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  // 大气微光
  ctx.globalCompositeOperation = 'lighter';
  const atm = ctx.createRadialGradient(cx, cy, r*0.85, cx, cy, r*1.25);
  atm.addColorStop(0, `hsla(${hue},90%,70%,0.25)`);
  atm.addColorStop(1, `hsla(${hue},90%,70%,0)`);
  ctx.fillStyle = atm; ctx.beginPath(); ctx.arc(cx, cy, r*1.25, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}
function drawEarth(cx, cy, r, rot, bass) {
  ctx.save();
  // 外层大气辉光
  ctx.globalCompositeOperation = 'lighter';
  const halo = ctx.createRadialGradient(cx, cy, r*0.9, cx, cy, r*1.5);
  halo.addColorStop(0, `hsla(205,95%,70%,${0.35 + bass*0.2})`);
  halo.addColorStop(1, 'hsla(205,95%,70%,0)');
  ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, r*1.5, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // 裁剪到球面
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
  // 海洋
  const ocean = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.15, cx, cy, r);
  ocean.addColorStop(0, '#3aa0ff');
  ocean.addColorStop(0.6, '#1560c4');
  ocean.addColorStop(1, '#062a63');
  ctx.fillStyle = ocean; ctx.fillRect(cx - r, cy - r, r*2, r*2);
  // 大陆 (投影到自转球面)
  const drawBlobs = (list, front) => {
    for (const c of list) {
      const ang = (c.u + rot) * Math.PI * 2;
      const depth = Math.cos(ang);
      if (depth <= 0.05) continue;                 // 背面不画
      const px = cx + Math.sin(ang) * r * 0.82;
      const py = cy + c.v * r;
      const sc = depth;                            // 边缘透视收缩
      const rad = c.s * r * sc;
      const edgeFade = Math.min(1, depth * 1.6);
      front(px, py, rad, edgeFade);
    }
  };
  // 陆地
  drawBlobs(CONTINENTS, (px, py, rad, fade) => {
    const g = ctx.createRadialGradient(px, py, 0, px, py, rad);
    g.addColorStop(0, `rgba(84,170,84,${0.95*fade})`);
    g.addColorStop(0.7, `rgba(58,132,66,${0.9*fade})`);
    g.addColorStop(1, `rgba(120,110,60,0)`);
    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(px, py, rad, rad*0.78, 0, 0, Math.PI*2); ctx.fill();
  });
  // 云层 (稍快自转)
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  const cloudRot = (rot * 1.3) % 1;
  for (const c of CLOUDS) {
    const ang = (c.u + cloudRot) * Math.PI * 2;
    const depth = Math.cos(ang);
    if (depth <= 0.05) continue;
    const px = cx + Math.sin(ang) * r * 0.82;
    const py = cy + c.v * r;
    const rad = c.s * r * depth;
    const g = ctx.createRadialGradient(px, py, 0, px, py, rad);
    g.addColorStop(0, `rgba(255,255,255,${0.5*depth})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(px, py, rad, rad*0.6, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // 昼夜: 阴影落在背光侧 (光来自左上)
  const night = ctx.createRadialGradient(cx - r*0.5, cy - r*0.5, r*0.2, cx + r*0.5, cy + r*0.5, r*1.5);
  night.addColorStop(0, 'rgba(0,0,10,0)');
  night.addColorStop(0.55, 'rgba(0,0,12,0.15)');
  night.addColorStop(1, 'rgba(0,0,15,0.82)');
  ctx.fillStyle = night; ctx.fillRect(cx - r, cy - r, r*2, r*2);
  ctx.restore(); // 结束裁剪

  // 受光边缘高光
  ctx.globalCompositeOperation = 'lighter';
  const rim = ctx.createRadialGradient(cx - r*0.4, cy - r*0.4, r*0.6, cx - r*0.4, cy - r*0.4, r*1.05);
  rim.addColorStop(0, 'rgba(180,220,255,0)');
  rim.addColorStop(1, 'rgba(180,220,255,0.18)');
  ctx.fillStyle = rim; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

// ---------- 节拍涟漪 ----------
const ripples = [];
let bassAvg = 0, beatCooldown = 0;

// ---------- 平滑频谱 ----------
const NUM_BARS = 128;
const smooth = new Float32Array(NUM_BARS);

// ---------- 歌词 ----------
let lyrics = [], curLyric = -1;
const lyricEl = document.getElementById('lyric');
const lyricNextEl = document.getElementById('lyricNext');
async function loadLyrics() {
  try {
    const text = await (await fetch('heisemaoyi.lrc')).text();
    const skip = ['词：','曲：','编曲','制作','和声','混音','母带','监制',' - ','演唱'];
    const re = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\](.*)/;
    lyrics = text.split(/\r?\n/).map(l => {
      const m = l.match(re); if (!m) return null;
      const t = m[4].trim(); if (!t || skip.some(s => t.includes(s))) return null;
      const frac = m[3] ? parseInt(m[3].padEnd(3,'0'),10)/1000 : 0;
      return { time: +m[1]*60 + +m[2] + frac, text: t };
    }).filter(Boolean).sort((a,b)=>a.time-b.time);
  } catch(e){ lyrics = []; }
}
function updateLyrics(t) {
  if (!lyrics.length) return;
  let idx = -1;
  for (let i = 0; i < lyrics.length; i++){ if (t >= lyrics[i].time) idx = i; else break; }
  if (idx !== curLyric) {
    curLyric = idx;
    lyricEl.classList.remove('show');
    setTimeout(() => {
      lyricEl.textContent = idx >= 0 ? lyrics[idx].text : '';
      lyricNextEl.textContent = (idx + 1 < lyrics.length) ? lyrics[idx + 1].text : '';
      if (idx >= 0) lyricEl.classList.add('show');
    }, 120);
  }
}

// ---------- 绘制辅助 ----------
let hue = 210;
function drawBackground(dt, bass) {
  hue = (hue + dt * 4) % 360;
  const t = performance.now() / 1000;
  // 深邃夜空 (自上而下的浪漫渐变)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0620');
  g.addColorStop(0.45, '#0b0a2a');
  g.addColorStop(1, '#050414');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';
  // 银河光带 (斜向柔光)
  ctx.save();
  ctx.translate(CX, CY); ctx.rotate(-0.5);
  const mg = ctx.createLinearGradient(0, -H * 0.28, 0, H * 0.28);
  mg.addColorStop(0, 'hsla(260,80%,60%,0)');
  mg.addColorStop(0.5, `hsla(280,80%,66%,${0.10 + bass * 0.06})`);
  mg.addColorStop(1, 'hsla(210,80%,60%,0)');
  ctx.fillStyle = mg; ctx.fillRect(-W, -H * 0.28, W * 2, H * 0.56);
  ctx.restore();

  // 浪漫星云云团 (粉紫蓝, 随低频缓慢呼吸)
  const clouds = [
    { h: 320, ox: -0.26, oy: -0.18 },  // 粉
    { h: 265, ox: 0.28,  oy: 0.14  },  // 紫
    { h: 205, ox: 0.05,  oy: 0.28  }   // 蓝
  ];
  for (let i = 0; i < clouds.length; i++) {
    const c = clouds[i];
    const bx = CX + Math.cos(t * 0.12 + i * 2.1) * W * 0.12 + W * c.ox;
    const by = CY + Math.sin(t * 0.10 + i * 1.7) * H * 0.10 + H * c.oy;
    const rad = (Math.min(W, H) * 0.42) * (0.85 + bass * 0.4);
    const rg = ctx.createRadialGradient(bx, by, 0, bx, by, rad);
    rg.addColorStop(0, `hsla(${c.h}, 90%, 65%, ${0.09 + bass * 0.08})`);
    rg.addColorStop(0.6, `hsla(${c.h}, 85%, 55%, ${0.03 + bass * 0.03})`);
    rg.addColorStop(1, 'hsla(0,0%,0%,0)');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(bx, by, rad, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function drawStars(dt, bass) {
  ctx.globalCompositeOperation = 'lighter';
  const t = performance.now() / 1000;
  for (const s of stars) {
    // 极缓慢漂移 (静谧夜空), 视差
    s.y -= dt * (2 + s.z * 5);
    if (s.y < -4) { s.y = H + 4; s.x = Math.random() * W; }
    const tw = 0.5 + 0.5 * Math.sin(t * s.tws + s.tw);   // 闪烁
    const a = Math.min(1, (0.18 + tw * 0.75) * (0.55 + bass * 0.6) * (0.4 + s.z * 0.6));
    const r = s.r * (1 + bass * s.z * 1.2 + tw * 0.25);
    // 柔光晕
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 4);
    glow.addColorStop(0, hexA(s.color, a));
    glow.addColorStop(1, hexA(s.color, 0));
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(s.x, s.y, r * 4, 0, Math.PI * 2); ctx.fill();
    // 星芯
    ctx.fillStyle = hexA(s.color, Math.min(1, a + 0.2));
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    // 亮星十字星芒 (闪闪浪漫)
    if (s.flare) {
      const fl = (r + tw * 3) * 3.2;
      ctx.strokeStyle = hexA(s.color, a * 0.9);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(s.x - fl, s.y); ctx.lineTo(s.x + fl, s.y);
      ctx.moveTo(s.x, s.y - fl); ctx.lineTo(s.x, s.y + fl);
      ctx.stroke();
    }
  }
  ctx.globalCompositeOperation = 'source-over';
}

function drawRibbons(dt) {
  // 三条丝带, 由中低频驱动的正弦波, 加法混合发光 (放松流动感)
  const t = performance.now() / 1000;
  ctx.globalCompositeOperation = 'lighter';
  for (let r = 0; r < 3; r++) {
    const band = Math.floor(6 + r * 10);
    const amp = (freq[band] / 255) * H * 0.16 + 12;
    const bh = (hue + 40 + r * 60) % 360;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 12) {
      const phase = x * 0.006 + t * (0.6 + r * 0.25) + r * 2;
      const y = CY + Math.sin(phase) * amp * Math.sin(x / W * Math.PI)
                + Math.sin(phase * 2.3) * amp * 0.3 + (r - 1) * 40;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${bh}, 90%, 68%, 0.5)`;
    ctx.lineWidth = 2.5; ctx.shadowColor = `hsl(${bh},90%,65%)`; ctx.shadowBlur = 24;
    ctx.stroke();
  }
  ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
}

function drawSpectrum(bass) {
  // 径向频谱: 围绕核心的镜像光柱
  const bins = analyser.frequencyBinCount;
  const baseR = Math.min(W, H) * (0.16 + bass * 0.05);
  ctx.save();
  ctx.translate(CX, CY);
  ctx.globalCompositeOperation = 'lighter';
  const half = NUM_BARS;
  for (let i = 0; i < half; i++) {
    // 对数取频, 低频更集中
    const fi = Math.floor(Math.pow(i / half, 1.6) * (bins * 0.7));
    const target = freq[fi] / 255;
    smooth[i] += (target - smooth[i]) * 0.35;
    const len = smooth[i] * Math.min(W, H) * 0.34;
    const bh = (hue + i * 1.6) % 360;
    // 镜像两侧, 共 360°
    for (const dir of [1, -1]) {
      const ang = (i / half) * Math.PI * dir - Math.PI / 2;
      const x1 = Math.cos(ang) * baseR, y1 = Math.sin(ang) * baseR;
      const x2 = Math.cos(ang) * (baseR + len), y2 = Math.sin(ang) * (baseR + len);
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0, `hsla(${bh}, 95%, 65%, 0.15)`);
      grad.addColorStop(1, `hsla(${bh}, 95%, 68%, 0.95)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      // 尖端亮点
      ctx.fillStyle = `hsla(${bh}, 100%, 80%, ${0.4 + smooth[i]*0.6})`;
      ctx.beginPath(); ctx.arc(x2, y2, 1.6 + smooth[i]*2.5, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
}

function drawCore(bass, mid) {
  // 呼吸星云核心
  const r = Math.min(W, H) * 0.16 * (1 + bass * 0.5);
  ctx.save(); ctx.translate(CX, CY);
  ctx.globalCompositeOperation = 'lighter';
  // 外层光晕
  const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.4);
  halo.addColorStop(0, `hsla(${(hue+30)%360}, 90%, 70%, ${0.35 + bass*0.4})`);
  halo.addColorStop(0.5, `hsla(${(hue+80)%360}, 90%, 55%, 0.12)`);
  halo.addColorStop(1, 'hsla(0,0%,0%,0)');
  ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(0, 0, r * 2.4, 0, Math.PI*2); ctx.fill();
  // 波形环 (时域)
  analyser.getByteTimeDomainData(timeDomain);
  ctx.beginPath();
  const step = Math.floor(timeDomain.length / 180);
  for (let i = 0, j = 0; i < timeDomain.length; i += step, j++) {
    const v = (timeDomain[i] - 128) / 128;
    const ang = (j / 180) * Math.PI * 2;
    const rr = r * 1.15 + v * 40 * (0.6 + mid);
    const x = Math.cos(ang) * rr, y = Math.sin(ang) * rr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = `hsla(${(hue+120)%360}, 95%, 78%, 0.85)`;
  ctx.lineWidth = 2; ctx.shadowColor = `hsl(${(hue+120)%360},95%,70%)`; ctx.shadowBlur = 20;
  ctx.stroke(); ctx.shadowBlur = 0;
  // 内核
  const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
  core.addColorStop(0, 'rgba(255,255,255,0.95)');
  core.addColorStop(0.35, `hsla(${(hue+40)%360}, 90%, 72%, 0.8)`);
  core.addColorStop(1, `hsla(${(hue+80)%360}, 90%, 45%, 0)`);
  ctx.fillStyle = core; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
}

function drawRipples(dt) {
  ctx.globalCompositeOperation = 'lighter';
  for (const rp of ripples) {
    rp.t += dt; rp.r += (rp.max - rp.r) * Math.min(1, dt * 2.2);
    const p = rp.t / rp.life;
    ctx.globalAlpha = Math.max(0, 1 - p) * 0.6;
    ctx.beginPath(); ctx.arc(CX, CY, rp.r, 0, Math.PI*2);
    ctx.strokeStyle = `hsl(${rp.hue}, 95%, 70%)`;
    ctx.lineWidth = (1 - p) * 4 + 0.5;
    ctx.shadowColor = `hsl(${rp.hue},95%,65%)`; ctx.shadowBlur = 16; ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
  for (let i = ripples.length - 1; i >= 0; i--) if (ripples[i].t > ripples[i].life) ripples.splice(i, 1);
}

// ---------- 主循环 ----------
let running = false, last = 0;
function frame(now) {
  if (!running) return;
  const dt = Math.min(0.05, (now - last) / 1000) || 0; last = now;
  analyser.getByteFrequencyData(freq);

  // 能量: 低频(bass) 与 中频(mid)
  let bass = 0; for (let i = 1; i < 10; i++) bass += freq[i]; bass /= 9 * 255;
  let mid = 0; for (let i = 20; i < 60; i++) mid += freq[i]; mid /= 40 * 255;

  // 节拍检测 -> 涟漪
  bassAvg = bassAvg * 0.94 + bass * 0.06;
  beatCooldown -= dt;
  if (bass > bassAvg * 1.4 && bass > 0.28 && beatCooldown <= 0) {
    beatCooldown = 0.22;
    ripples.push({ r: Math.min(W,H)*0.16, max: Math.min(W,H)*0.55, t: 0, life: 1.1, hue: (hue+90)%360 });
  }

  drawBackground(dt, bass);
  drawStars(dt, bass);
  updateMeteors(dt); drawMeteors();
  updatePlanets(dt); drawPlanets(dt, bass);
  drawRibbons(dt);
  drawRipples(dt);
  drawSpectrum(bass);
  drawCore(bass, mid);

  updateLyrics(audio.currentTime);
  updateProgress();
  requestAnimationFrame(frame);
}

// 待机时也有柔和的动态背景 (未播放)
function idleFrame(now) {
  if (running) return;
  const dt = Math.min(0.05, (now - last) / 1000) || 0; last = now;
  drawBackground(dt, 0.05);
  drawStars(dt, 0.05);
  updateMeteors(dt); drawMeteors();
  updatePlanets(dt); drawPlanets(dt, 0.05);
  requestAnimationFrame(idleFrame);
}

// ---------- UI ----------
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const playPause = document.getElementById('playPause');
const timeEl = document.getElementById('time');
const progress = document.getElementById('progress');

function fmt(s){ if(!isFinite(s)) return '0:00'; const m=Math.floor(s/60),ss=Math.floor(s%60); return m+':'+String(ss).padStart(2,'0'); }
function updateProgress() {
  if (audio.duration) {
    progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
    timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
  }
}

async function start() {
  if (!actx) setupAudio();
  if (actx.state === 'suspended') await actx.resume();
  overlay.classList.add('hidden');
  try { await audio.play(); } catch(e){ console.warn(e); }
  running = true; last = performance.now(); requestAnimationFrame(frame);
}
playBtn.addEventListener('click', start);

playPause.addEventListener('click', (e) => {
  e.stopPropagation();
  if (audio.paused) { audio.play(); running = true; last = performance.now(); requestAnimationFrame(frame); playPause.textContent = '❚❚'; }
  else { audio.pause(); running = false; playPause.textContent = '▶'; requestAnimationFrame(idleFrame); }
});

// 点击唤出/隐藏控制条
let barTimer;
document.addEventListener('click', (e) => {
  if (!actx || e.target.closest('#bar') || e.target.closest('.overlay')) return;
  bar.classList.add('show');
  clearTimeout(barTimer);
  barTimer = setTimeout(() => bar.classList.remove('show'), 3200);
});

audio.addEventListener('ended', () => { running = false; playPause.textContent = '▶'; requestAnimationFrame(idleFrame); });

// 启动待机动画 + 载入歌词
loadLyrics();
playBtn.disabled = false;
requestAnimationFrame(idleFrame);
</script>
