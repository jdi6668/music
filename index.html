<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>节拍小球 · 撞击钢琴键 · 黑色毛衣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  body {
    background: radial-gradient(circle at 50% 30%, #1a2540 0%, #0d1424 55%, #060a14 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }

  #lyric {
    position: absolute; top: 6%; left: 0; width: 100%; text-align: center;
    color: #eaf2ff; font-size: clamp(20px, 5vw, 34px); font-weight: 700;
    letter-spacing: 3px; text-shadow: 0 0 18px rgba(120,180,255,.55);
    pointer-events: none; z-index: 5; transition: opacity .3s; padding: 0 16px;
  }
  #hud {
    position: absolute; top: 18px; right: 22px; z-index: 5;
    color: #cfe0ff; font-size: 14px; letter-spacing: 1px; text-align: right;
    text-shadow: 0 2px 6px rgba(0,0,0,.6);
  }
  #hud b { color: #7fd0ff; font-size: 22px; }

  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(20,34,64,.82), rgba(6,10,20,.94));
    color: #eaf2ff; text-align: center; gap: 22px; padding: 24px;
  }
  .overlay.hidden { display: none; }
  .title {
    font-size: clamp(28px, 7vw, 48px); font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(90deg, #7fd0ff, #b18cff, #ff9ecf);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 34px rgba(150,190,255,.3);
  }
  .subtitle { font-size: 15px; opacity: .8; max-width: 520px; line-height: 1.9; }
  .btn {
    cursor: pointer; padding: 14px 48px; font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: #0a1830; border: none; border-radius: 40px;
    background: linear-gradient(135deg, #7fd0ff, #b18cff);
    box-shadow: 0 10px 34px rgba(130,160,255,.5); transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 16px 44px rgba(130,160,255,.65); }
  .btn:disabled { opacity: .55; cursor: default; transform: none; }
  .status { font-size: 14px; opacity: .7; min-height: 20px; }
  .spinner {
    width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.2);
    border-top-color: #7fd0ff; border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="lyric"></div>
  <div id="hud"><b id="beatCount">0</b><div>节拍撞击 / BEATS</div></div>

  <div class="overlay" id="startOverlay">
    <div class="title">节拍小球 · 撞钢琴键</div>
    <div class="subtitle">
      跟着《黑色毛衣》的节拍，小球从空中掉落，<br>
      每一个节拍精准地撞击一次钢琴键 —— 键盘随之发光、迸发光点。
    </div>
    <button class="btn" id="startBtn" disabled>正在分析节拍…</button>
    <div class="status" id="status"><div class="spinner"></div></div>
  </div>
</div>

<script>
/* =====================================================================
   节拍小球撞击钢琴键 —— 黑色毛衣
   1) 离线解码 mp3 -> 计算 onset 能量包络 -> 自相关估计速度(BPM)
   2) 生成与歌曲对齐的等间隔节拍网格 (fetch/解码失败则回退固定 BPM)
   3) 小球沿抛物线在琴键间弹跳, 每个节拍精准落在一个键上并触发特效
   ===================================================================== */

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutKeys();
}
window.addEventListener('resize', resize);

// ---------- 钢琴键盘布局 ----------
const NUM_WHITE = 14;               // 两个八度的白键
const WHITE_PATTERN = [0,2,4,5,7,9,11]; // C大调白键的半音偏移
const KEY_COLORS = ['#ff6b9d','#ffb36b','#ffe66b','#9dff6b','#6bffd5','#6bb3ff','#b18cff'];
let keys = [];                      // {x, w, top, isBlack, color, freq, glow}
let kbTop = 0, kbHeight = 0, whiteW = 0;

function midiToFreq(m){ return 440 * Math.pow(2, (m - 69) / 12); }

function layoutKeys() {
  keys = [];
  kbHeight = Math.max(150, Math.min(H * 0.26, 260));
  kbTop = H - kbHeight;
  whiteW = W / NUM_WHITE;
  const baseMidi = 48; // C3
  // 白键
  for (let i = 0; i < NUM_WHITE; i++) {
    const oct = Math.floor(i / 7), deg = i % 7;
    const midi = baseMidi + oct * 12 + WHITE_PATTERN[deg];
    keys.push({
      x: i * whiteW, w: whiteW, top: kbTop, isBlack: false,
      color: KEY_COLORS[i % KEY_COLORS.length], freq: midiToFreq(midi), glow: 0
    });
  }
  // 黑键 (装饰 + 也可被撞): 位于相邻白键之间, 除 E-F, B-C
  const blackAfter = [0,1,3,4,5]; // 每个八度内, 在第0/1/3/4/5个白键之后有黑键
  for (let oct = 0; oct < 2; oct++) {
    for (const d of blackAfter) {
      const i = oct * 7 + d;
      if (i >= NUM_WHITE - 1) continue;
      const bw = whiteW * 0.62;
      const midi = baseMidi + oct * 12 + WHITE_PATTERN[d] + 1;
      keys.push({
        x: (i + 1) * whiteW - bw / 2, w: bw, top: kbTop, isBlack: true,
        color: '#c58cff', freq: midiToFreq(midi), glow: 0, bh: kbHeight * 0.62
      });
    }
  }
}

// ---------- 音频: 播放 + 特效合成 ----------
let audioEl = new Audio('heisemaoyi.mp3');
audioEl.preload = 'auto';
let sfxCtx = null;
function ensureSfx(){ if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)(); }

// 合成钢琴音 (撞击重音): 基频 + 泛音, 快起指数衰减
function playPiano(freq, vel = 1) {
  if (!sfxCtx) return;
  const t = sfxCtx.currentTime;
  const master = sfxCtx.createGain();
  master.gain.value = 0.9 * vel;
  master.connect(sfxCtx.destination);
  const partials = [[1, 1.0], [2, 0.5], [3, 0.28], [4, 0.14]];
  for (const [mult, amp] of partials) {
    const osc = sfxCtx.createOscillator();
    const g = sfxCtx.createGain();
    osc.type = mult === 1 ? 'triangle' : 'sine';
    osc.frequency.value = freq * mult;
    const dur = 0.9 / mult;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.32 * amp, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(master);
    osc.start(t); osc.stop(t + dur + 0.02);
  }
  // 木槌撞击的低频 thump
  const th = sfxCtx.createOscillator(), tg = sfxCtx.createGain();
  th.type = 'sine'; th.frequency.setValueAtTime(150, t);
  th.frequency.exponentialRampToValueAtTime(55, t + 0.13);
  tg.gain.setValueAtTime(0.0001, t);
  tg.gain.exponentialRampToValueAtTime(0.3 * vel, t + 0.008);
  tg.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  th.connect(tg); tg.connect(sfxCtx.destination);
  th.start(t); th.stop(t + 0.2);
}

// ---------- 节拍分析 (离线解码 + 速度估计 -> 节拍网格) ----------
let beats = [];        // 节拍时间(秒)
let beatKey = [];      // 每个节拍对应的琴键索引
const WHITE_IDX = Array.from({length: NUM_WHITE}, (_, i) => i);

async function analyzeBeats() {
  setStatus('正在加载并分析音频节拍…');
  try {
    const buf = await (await fetch('heisemaoyi.mp3')).arrayBuffer();
    const ac = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
    const audioBuf = await ac.decodeAudioData(buf);
    beats = detectBeatGrid(audioBuf);
    if (!beats.length) throw new Error('empty');
    setStatus('节拍分析完成 · 共 ' + beats.length + ' 拍');
  } catch (e) {
    console.warn('节拍分析失败, 使用固定 BPM 回退:', e);
    beats = fallbackGrid(72);
    setStatus('使用估计节拍 (72 BPM)');
  }
  assignKeys();
}

// 固定 BPM 网格 (回退方案)
function fallbackGrid(bpm) {
  const period = 60 / bpm, out = [];
  const dur = isFinite(audioEl.duration) && audioEl.duration ? audioEl.duration : 235;
  for (let t = 1.0; t < dur; t += period) out.push(+t.toFixed(3));
  return out;
}

// 从解码后的音频计算等间隔节拍网格
function detectBeatGrid(audioBuf) {
  const data = audioBuf.getChannelData(0);
  const sr = audioBuf.sampleRate;
  const hop = 512;
  const fps = sr / hop;
  const frames = Math.floor(data.length / hop);

  // 1) 每帧 RMS 能量
  const energy = new Float32Array(frames);
  for (let f = 0; f < frames; f++) {
    let sum = 0; const s = f * hop;
    for (let i = 0; i < hop; i++) { const v = data[s + i]; sum += v * v; }
    energy[f] = Math.sqrt(sum / hop);
  }
  // 2) onset 强度 = 能量的正向差分 (半波整流)
  const flux = new Float32Array(frames);
  for (let f = 1; f < frames; f++) { const d = energy[f] - energy[f - 1]; flux[f] = d > 0 ? d : 0; }
  // 平滑并去均值
  const env = new Float32Array(frames);
  let mean = 0;
  for (let f = 0; f < frames; f++) {
    let a = 0, n = 0;
    for (let k = -2; k <= 2; k++){ const j = f + k; if (j >= 0 && j < frames){ a += flux[j]; n++; } }
    env[f] = a / n; mean += env[f];
  }
  mean /= frames;
  for (let f = 0; f < frames; f++) env[f] -= mean;

  // 3) 自相关估计节拍周期 (60~180 BPM)
  const minLag = Math.round(fps * 60 / 180);
  const maxLag = Math.round(fps * 60 / 60);
  let bestLag = minLag, bestScore = -Infinity;
  for (let lag = minLag; lag <= maxLag; lag++) {
    let s = 0;
    for (let f = 0; f + lag < frames; f++) s += env[f] * env[f + lag];
    if (s > bestScore) { bestScore = s; bestLag = lag; }
  }
  const period = bestLag; // 帧
  // 4) 相位对齐: 找到能量脉冲串最匹配的偏移
  let bestPhase = 0, bestPhaseScore = -Infinity;
  for (let off = 0; off < period; off++) {
    let s = 0;
    for (let f = off; f < frames; f += period) s += env[f];
    if (s > bestPhaseScore) { bestPhaseScore = s; bestPhase = off; }
  }
  // 5) 生成节拍网格
  const out = [];
  for (let f = bestPhase; f < frames; f += period) {
    const t = f / fps;
    if (t > 0.3) out.push(+t.toFixed(3));
  }
  return out;
}

// 每个节拍分配一个琴键: 平滑随机漫步, 让小球在键间自然移动
function assignKeys() {
  beatKey = [];
  let seed = 20240704;
  const rnd = () => (seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  let idx = Math.floor(NUM_WHITE / 2);
  for (let i = 0; i < beats.length; i++) {
    const step = 1 + Math.floor(rnd() * 3);
    idx += (rnd() < 0.5 ? -step : step);
    if (idx < 0) idx = Math.abs(idx);
    if (idx > NUM_WHITE - 1) idx = 2 * (NUM_WHITE - 1) - idx;
    idx = Math.max(0, Math.min(NUM_WHITE - 1, idx));
    beatKey.push(WHITE_IDX[idx]);
  }
}

// ---------- 小球 ----------
const ball = { x: 0, y: 0, r: 18, squash: 0 };
function keyCenterX(ki){ const k = keys[ki]; return k.x + k.w / 2; }
function keyLandY(ki){ return keys[ki].top - ball.r; }

// 依据当前播放时间, 计算小球在两个节拍键之间的抛物线位置
function updateBall(t) {
  if (!beats.length) return;
  // 找到当前所处的节拍区间 [i, i+1]
  let i = 0;
  while (i < beats.length && beats[i] <= t) i++;
  // i = 下一个尚未到达的节拍索引
  let x0, x1, t0, t1, ki0, ki1;
  if (i === 0) {
    // 第一拍之前: 从画面上方落向第一个键
    t1 = beats[0]; t0 = Math.max(0, t1 - 1.0);
    ki1 = beatKey[0]; x1 = keyCenterX(ki1); x0 = x1;
    ki0 = ki1;
  } else if (i >= beats.length) {
    // 最后一拍之后: 停在最后的键上
    ki0 = beatKey[beats.length - 1];
    ball.x = keyCenterX(ki0); ball.y = keyLandY(ki0);
    return;
  } else {
    t0 = beats[i - 1]; t1 = beats[i];
    ki0 = beatKey[i - 1]; ki1 = beatKey[i];
    x0 = keyCenterX(ki0); x1 = keyCenterX(ki1);
  }
  const span = Math.max(0.001, t1 - t0);
  let p = (t - t0) / span;            // 0..1
  p = Math.max(0, Math.min(1, p));
  ball.x = x0 + (x1 - x0) * p;
  // 抛物线: p=0 与 p=1 时落在键面, 中间最高
  const landY0 = keyLandY(ki0), landY1 = keyLandY(ki1);
  const landY = landY0 + (landY1 - landY0) * p;
  const jump = Math.min(kbTop * 0.72, 120 + span * 90);
  ball.y = landY - jump * 4 * p * (1 - p);
  // 落地前后的挤压形变
  const near = Math.min(p, 1 - p);
  ball.squash = near < 0.12 ? (0.12 - near) / 0.12 : 0;
}

// ---------- 特效: 粒子 / 涟漪 / 震屏 ----------
const particles = [], rings = [];
const fx = { shake: 0 };
function burst(x, y, color) {
  for (let i = 0; i < 22; i++) {
    const a = Math.random() * Math.PI - Math.PI, sp = 90 + Math.random() * 260;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: -Math.abs(Math.sin(a)) * sp - 40,
      life: 0.5 + Math.random() * 0.5, t: 0, r: 1.5 + Math.random() * 3,
      color: Math.random() < 0.5 ? color : '#ffffff' });
  }
}
function addRing(x, y, color){ rings.push({ x, y, r: 4, max: 70, t: 0, life: 0.5, color }); }
function updateEffects(dt) {
  for (const p of particles){ p.t += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 520*dt; }
  for (let i = particles.length-1; i>=0; i--) if (particles[i].t > particles[i].life) particles.splice(i,1);
  for (const r of rings){ r.t += dt; r.r += (r.max - r.r) * Math.min(1, dt*9); }
  for (let i = rings.length-1; i>=0; i--) if (rings[i].t > rings[i].life) rings.splice(i,1);
  if (fx.shake > 0){ fx.shake -= dt*40; if (fx.shake < 0) fx.shake = 0; }
  for (const k of keys) if (k.glow > 0){ k.glow -= dt*2.4; if (k.glow < 0) k.glow = 0; }
}

// ---------- 命中触发 (每拍一次) ----------
let lastBeat = -1, beatCount = 0;
const beatCountEl = document.getElementById('beatCount');
function checkBeats(t) {
  let passed = 0;
  while (passed < beats.length && beats[passed] <= t) passed++;
  const idx = passed - 1;
  if (idx > lastBeat) {
    for (let b = lastBeat + 1; b <= idx; b++) hitBeat(b);
    lastBeat = idx;
  }
}
function hitBeat(b) {
  const ki = beatKey[b]; const k = keys[ki];
  k.glow = 1.4;
  const cx = keyCenterX(ki), cy = k.top;
  burst(cx, cy, k.color); addRing(cx, cy, k.color);
  fx.shake = 9;
  playPiano(k.freq, 0.85);
  beatCount++; beatCountEl.textContent = beatCount;
}

// ---------- 歌词 (来自 heisemaoyi.lrc) ----------
let lyrics = [];
const lyricEl = document.getElementById('lyric');
async function loadLyrics() {
  try {
    const text = await (await fetch('heisemaoyi.lrc')).text();
    const skip = ['词：','曲：','编曲','制作','和声','混音','母带','监制',' - ','演唱'];
    const re = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\](.*)/;
    lyrics = text.split(/\r?\n/).map(l => {
      const m = l.match(re); if (!m) return null;
      const txt = m[4].trim();
      if (!txt || skip.some(s => txt.includes(s))) return null;
      const frac = m[3] ? parseInt(m[3].padEnd(3,'0'),10)/1000 : 0;
      return { time: +m[1]*60 + +m[2] + frac, text: txt };
    }).filter(Boolean).sort((a,b)=>a.time-b.time);
  } catch(e){ lyrics = []; }
}
function updateLyric(t) {
  if (!lyrics.length) return;
  let cur = '';
  for (const l of lyrics){ if (t >= l.time) cur = l.text; else break; }
  if (lyricEl.textContent !== cur) lyricEl.textContent = cur;
}

// ---------- 绘制 ----------
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#141f3a'); g.addColorStop(0.6, '#0b1222'); g.addColorStop(1, '#05080f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // 落点参考竖线 (下一拍将撞的键)
  if (lastBeat + 1 < beats.length) {
    const ki = beatKey[lastBeat + 1]; const cx = keyCenterX(ki);
    ctx.strokeStyle = 'rgba(140,180,255,0.10)'; ctx.lineWidth = 2;
    ctx.setLineDash([6, 10]); ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, kbTop); ctx.stroke(); ctx.setLineDash([]);
  }
}
function drawKeyboard() {
  // 白键
  for (const k of keys) {
    if (k.isBlack) continue;
    const lit = k.glow;
    ctx.fillStyle = lit > 0
      ? shade(k.color, 0.35 + lit * 0.65)
      : 'rgba(230,238,252,0.92)';
    if (lit > 0) { ctx.shadowColor = k.color; ctx.shadowBlur = 30 * lit; }
    roundRect(k.x + 1.5, k.top, k.w - 3, kbHeight, 6); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(20,30,50,0.5)'; ctx.lineWidth = 1;
    roundRect(k.x + 1.5, k.top, k.w - 3, kbHeight, 6); ctx.stroke();
  }
  // 黑键
  for (const k of keys) {
    if (!k.isBlack) continue;
    const lit = k.glow;
    ctx.fillStyle = lit > 0 ? shade(k.color, 0.4 + lit * 0.6) : '#1b2338';
    if (lit > 0){ ctx.shadowColor = k.color; ctx.shadowBlur = 28 * lit; }
    roundRect(k.x, k.top, k.w, k.bh, 4); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // 顶部高光条
  const g = ctx.createLinearGradient(0, kbTop, 0, kbTop + 8);
  g.addColorStop(0, 'rgba(255,255,255,0.5)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, kbTop, W, 8);
}
function drawBall() {
  const sq = ball.squash, sx = 1 + sq * 0.5, sy = 1 - sq * 0.5;
  // 阴影
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.ellipse(ball.x, kbTop - 2, ball.r * (0.8 + (1 - Math.min(1, (kbTop - ball.y)/300)) * 0.6), 5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill();
  ctx.restore();
  // 拖尾
  ctx.save();
  ctx.translate(ball.x, ball.y); ctx.scale(sx, sy);
  const grad = ctx.createRadialGradient(-ball.r*0.3, -ball.r*0.3, ball.r*0.1, 0, 0, ball.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, '#8fd0ff');
  grad.addColorStop(1, '#5b7cff');
  ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.shadowColor = '#7fb0ff'; ctx.shadowBlur = 26; ctx.fill();
  ctx.beginPath(); ctx.arc(-ball.r*0.3, -ball.r*0.3, ball.r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 0; ctx.fill();
  ctx.restore();
}
function drawEffects() {
  for (const r of rings) {
    const p = r.t / r.life;
    ctx.globalAlpha = Math.max(0, 1 - p) * 0.85;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = r.color; ctx.lineWidth = 3 * (1 - p) + 1;
    ctx.shadowColor = r.color; ctx.shadowBlur = 12; ctx.stroke();
  }
  ctx.shadowBlur = 0;
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// 将十六进制颜色向白色混合 (amt 0..1 越大越亮)
function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  const mix = c => Math.round(c + (255 - c) * (1 - amt) * 0.2 + amt * 0);
  return `rgb(${Math.min(255,r+amt*40)|0},${Math.min(255,g+amt*40)|0},${Math.min(255,b+amt*40)|0})`;
}

// ---------- 主循环 ----------
let running = false, lastFrame = 0;
function loop(now) {
  if (!running) return;
  const dt = Math.min(0.05, (now - lastFrame) / 1000) || 0;
  lastFrame = now;
  const t = audioEl.currentTime;

  checkBeats(t);
  updateBall(t);
  updateEffects(dt);
  updateLyric(t);

  drawBackground();
  ctx.save();
  if (fx.shake > 0) ctx.translate((Math.random()-0.5)*fx.shake, (Math.random()-0.5)*fx.shake);
  drawKeyboard();
  drawEffects();
  drawBall();
  ctx.restore();

  requestAnimationFrame(loop);
}

// ---------- 启动 ----------
const startBtn = document.getElementById('startBtn');
const startOverlay = document.getElementById('startOverlay');
const statusEl = document.getElementById('status');
function setStatus(s){ statusEl.textContent = s; }

async function boot() {
  resize();
  await Promise.all([loadLyrics(), analyzeBeats()]);
  startBtn.disabled = false;
  startBtn.textContent = '▶ 开始';
}

startBtn.addEventListener('click', async () => {
  ensureSfx();
  if (sfxCtx.state === 'suspended') await sfxCtx.resume();
  startOverlay.classList.add('hidden');
  lastBeat = -1; beatCount = 0; beatCountEl.textContent = 0;
  audioEl.currentTime = 0;
  try { await audioEl.play(); } catch(e){ console.warn('播放失败', e); }
  running = true; lastFrame = performance.now();
  requestAnimationFrame(loop);
});
audioEl.addEventListener('ended', () => { running = false; });

boot();
</script>
