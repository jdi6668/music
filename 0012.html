<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土耳其冰激凌 · 沉浸式音乐视界</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #05010f;
    color: #fff;
    position: relative;
  }
  /* 动态背景层 */
  #bgCanvas, #vizCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #bgCanvas { z-index: 0; }
  #vizCanvas { z-index: 1; }

  .stage {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 16px;
    text-align: center;
  }

  /* 黑胶唱片 */
  .vinyl-wrap {
    position: relative;
    width: 250px;
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vinyl {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, #2a2a2a 0 28%, transparent 28.5%),
      repeating-radial-gradient(circle at center, #111 0 2px, #1c1c1c 3px, #111 4px),
      #0a0a0a;
    box-shadow: 0 0 60px rgba(155,120,255,0.55), inset 0 0 40px rgba(0,0,0,0.9);
    animation: spin 8s linear infinite;
    animation-play-state: paused;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vinyl.playing { animation-play-state: running; }
  .cover {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 40%, #a18cd1 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
    border: 4px solid rgba(255,255,255,0.15);
  }
  .cover .note { font-size: 44px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
  .cover .hole {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #05010f;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
  }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* 唱臂 */
  .tonearm {
    position: absolute;
    top: -10px; right: -20px;
    width: 140px; height: 20px;
    transform-origin: right center;
    transform: rotate(-25deg);
    transition: transform .6s ease;
    z-index: 3;
  }
  .tonearm.playing { transform: rotate(8deg); }
  .tonearm .bar { position:absolute; right:0; top:6px; width:130px; height:6px; background:linear-gradient(90deg,#ccc,#888); border-radius:4px; }
  .tonearm .head { position:absolute; left:0; top:0; width:20px; height:20px; background:#ddd; border-radius:4px; box-shadow:0 0 8px rgba(0,0,0,.5); }
  .tonearm .pivot { position:absolute; right:-6px; top:-2px; width:24px; height:24px; background:radial-gradient(circle,#eee,#999); border-radius:50%; }

  .info { z-index: 2; }
  .song-title {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(90deg,#ffd6e0,#c1a3ff,#9be7ff);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
    text-shadow: 0 0 30px rgba(160,120,255,0.3);
  }
  @keyframes shine { to { background-position: 200% center; } }
  .artist { font-size: 17px; color: #b9a9e0; margin-top: 6px; letter-spacing: 3px; }

  /* 歌词 */
  .lyric-box {
    z-index: 2;
    flex: 0 0 auto;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    overflow: hidden;
    padding: 14px 0;
    width: min(760px, 94vw);
  }
  .lyric-box .line {
    font-size: 17px;
    color: rgba(200,185,235,0.45);
    transition: all .4s ease;
    text-align: center;
    line-height: 1.5;
    min-height: 1.5em;
  }
  .lyric-box .line.active {
    font-size: 25px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 24px rgba(193,163,255,0.9), 0 0 8px rgba(255,214,224,0.7);
    line-height: 1.5;
    min-height: 1.5em;
    background: linear-gradient(90deg,#ffd6e0,#c1a3ff,#9be7ff);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
  }

  /* 控制栏 */
  .controls {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: min(560px, 90vw);
    transition: opacity .6s ease, transform .6s ease;
  }
  .controls.hidden {
    opacity: 0;
    transform: translateY(30px);
    pointer-events: none;
  }
  .progress {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #cbb8f0;
    font-variant-numeric: tabular-nums;
  }
  .bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 6px;
    position: relative;
    cursor: pointer;
  }
  .bar-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    width: 0%;
    border-radius: 6px;
    background: linear-gradient(90deg,#ff9a9e,#a18cd1,#84fab0);
    box-shadow: 0 0 12px rgba(161,140,209,0.8);
  }
  .bar-fill::after {
    content:''; position:absolute; right:-6px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; border-radius:50%; background:#fff; box-shadow:0 0 10px #fff;
  }
  .btns { display: flex; align-items: center; gap: 22px; }
  .ctrl-btn {
    width: 54px; height: 54px; border-radius: 50%;
    border: none; cursor: pointer; color: #fff; font-size: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .2s, box-shadow .2s;
    backdrop-filter: blur(6px);
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.18); }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn.play {
    width: 74px; height: 74px; font-size: 28px;
    background: linear-gradient(135deg,#a18cd1,#fbc2eb);
    box-shadow: 0 6px 30px rgba(161,140,209,0.6);
  }
  .hint { font-size: 12px; color: #8a7cb8; }

  /* 音量 */
  .vol { display:flex; align-items:center; gap:8px; font-size:13px; color:#cbb8f0; }
  .vol input[type=range]{ width:90px; accent-color:#a18cd1; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="vizCanvas"></canvas>

<div class="stage">
  <div class="vinyl-wrap">
    <div class="vinyl" id="vinyl">
      <div class="cover">
        <span class="note">🎵</span>
        <div class="hole"></div>
      </div>
    </div>
    <div class="tonearm" id="tonearm">
      <div class="bar"></div>
      <div class="head"></div>
      <div class="pivot"></div>
    </div>
  </div>

  <div class="info">
    <div class="song-title">土耳其冰激凌</div>
    <div class="artist">周杰伦 · Jay Chou</div>
  </div>

  <div class="lyric-box" id="lyricBox">
    <div class="line">♪ 准备好，一起进入音乐视界 ♪</div>
  </div>

  <div class="controls">
    <div class="progress">
      <span id="cur">0:00</span>
      <div class="bar-track" id="track"><div class="bar-fill" id="fill"></div></div>
      <span id="dur">0:00</span>
    </div>
    <div class="btns">
      <button class="ctrl-btn" id="backBtn" title="后退10秒">⏪</button>
      <button class="ctrl-btn play" id="playBtn" title="播放/暂停">▶</button>
      <button class="ctrl-btn" id="fwdBtn" title="前进10秒">⏩</button>
    </div>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="1" step="0.01" value="0.9"></div>
    <div class="hint" id="hint">正在自动加载同目录下的「heisemaoyi.mp3」</div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const vinyl = document.getElementById('vinyl');
const tonearm = document.getElementById('tonearm');
const fill = document.getElementById('fill');
const track = document.getElementById('track');
const curEl = document.getElementById('cur');
const durEl = document.getElementById('dur');
const lyricBox = document.getElementById('lyricBox');
const hint = document.getElementById('hint');
const volSlider = document.getElementById('vol');

// 默认尝试加载同目录 mp3
audio.src = 'heisemaoyi.mp3';
audio.volume = 0.9;

/* ================= LRC 歌词解析与同步 ================= */
let lyrics = []; // {time, text}
let curLyricIdx = -1;

const EMBEDDED_LRC = `[00:00.00]土耳其冰淇淋 - 周杰伦 (Jay Chou)
[00:00.75]词：周杰伦
[00:01.50]曲：周杰伦
[00:02.25]编曲：周杰伦
[00:03.00]OS：
[00:04.00]Hello 我是DJ巨炮
[00:05.19]接下来为您播放的是
[00:06.00]舞曲也可以很有音乐性的
[00:07.32]Maraş dondurması
[00:24.96]土耳其冰淇淋 就像是女人的心
[00:27.12]在你的面前转来转去 却捉摸不定
[00:29.28]这音乐跳Waacking也可以跳Locking
[00:31.51]我耍你耍的就像土耳其的冰淇淋
[00:33.57]几个高级和弦 几个切分音
[00:35.54]我写的舞曲也可以很有音乐性
[00:37.74]就像卖个冰 还能秀杂技
[00:39.75]你最好期许如果你跟我一样努力
[00:42.50]换个乐器就像换个兵器
[00:44.49]电吉它这个时候出来干嘛 到底
[00:46.59]你猜不透也想不到摸不着头绪
[00:48.68]我总是为了什么出奇不意 到底
[00:50.82]谁说拍中国风 一定要配灯笼
[00:55.04]谁说写中国风 一定要商角徵羽宫
[00:59.31]我干脆自己下车 指挥乐坛的交通
[01:03.47]管他管他什么曲风
[01:07.81]土耳其冰淇淋 土耳其冰淇淋
[01:16.25]土耳其冰淇淋 土耳其冰淇淋
[01:40.77]加一点 土耳其进行曲 太丰富的编曲
[01:43.40]吃一口冰淇淋来融化你的伤心
[01:45.63]仔细听 几个半音 有点拉丁 有点热情
[01:48.18]那是我想要给的惊喜
[01:49.40]几个高级和弦 几个切分音
[01:51.35]我写的舞曲也可以很有音乐性
[01:53.52]就像卖个冰 还能秀杂技
[01:55.56]你最好期许如果你跟我一样努力
[01:58.29]换个乐器就像换个兵器
[02:00.26]电吉它这个时候出来干嘛 到底
[02:02.37]你猜不透也想不到摸不着头绪
[02:04.46]我总是为了什么出奇不意 到底
[02:06.62]谁说拍中国风 一定要配灯笼
[02:10.83]谁说写中国风 一定要商角徵羽宫
[02:15.09]我干脆自己下车 指挥乐坛的交通
[02:19.29]管他管他什么曲风
[02:23.63]土耳其冰淇淋 土耳其冰淇淋
[02:32.02]土耳其冰淇淋 土耳其冰淇淋
[02:53.25]土耳其冰淇淋 土耳其冰淇淋
[03:01.49]土耳其冰淇淋 土耳其冰淇淋`;

function parseLRC(text) {
  const lines = text.split(/\r?\n/);
  const res = [];
  const re = /\[(\d{1,2}):(\d{1,2})(?:[.:](\d{1,3}))?\]/g;
  for (const line of lines) {
    let m, matches = [];
    re.lastIndex = 0;
    while ((m = re.exec(line)) !== null) matches.push(m);
    if (!matches.length) continue;
    const content = line.replace(/\[[^\]]*\]/g, '').trim();
    for (const mm of matches) {
      const min = parseInt(mm[1]);
      const sec = parseInt(mm[2]);
      let ms = mm[3] ? parseInt(mm[3]) : 0;
      if (mm[3] && mm[3].length === 2) ms *= 10;
      const t = min*60 + sec + ms/1000;
      res.push({ time: t, text: content || '♪' });
    }
  }
  res.sort((a,b)=>a.time-b.time);
  return res;
}

function loadLRC(url) {
  // 先用内置歌词立即渲染，保证一定能显示
  lyrics = parseLRC(EMBEDDED_LRC);
  renderLyrics(0);
  // 再尝试读取外部 .lrc 覆盖（本地 file:// 可能被浏览器拦截，失败则保留内置）
  fetch(url).then(r => { if(!r.ok) throw new Error('no lrc'); return r.text(); })
    .then(txt => { const p = parseLRC(txt); if (p.length) { lyrics = p; curLyricIdx = -1; renderLyrics(0); } })
    .catch(()=>{});
}
loadLRC('heisemaoyi.lrc');

function renderLyrics(activeIdx) {
  if (!lyrics.length) return;
  lyricBox.innerHTML = '';
  // 显示当前行前后各2行
  for (let i = activeIdx-2; i <= activeIdx+2; i++) {
    if (i < 0 || i >= lyrics.length) continue;
    const div = document.createElement('div');
    div.className = 'line' + (i === activeIdx ? ' active' : '');
    div.textContent = lyrics[i].text;
    lyricBox.appendChild(div);
  }
}

function syncLyric(t) {
  if (!lyrics.length) return;
  let idx = -1;
  for (let i=0;i<lyrics.length;i++){
    if (lyrics[i].time <= t) idx = i; else break;
  }
  if (idx !== curLyricIdx) {
    curLyricIdx = idx;
    renderLyrics(idx);
  }
}

/* ================= Web Audio 分析 ================= */
let audioCtx, analyser, dataArray, srcNode, isAudioInit = false;
function initAudio() {
  if (isAudioInit) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  srcNode = audioCtx.createMediaElementSource(audio);
  srcNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  isAudioInit = true;
}

/* ================= 频谱可视化 ================= */
const viz = document.getElementById('vizCanvas');
const vctx = viz.getContext('2d');
const bg = document.getElementById('bgCanvas');
const bctx = bg.getContext('2d');
let W, H, CX, CY;
function resize() {
  W = viz.width = bg.width = window.innerWidth;
  H = viz.height = bg.height = window.innerHeight;
  CX = W/2; CY = H/2;
}
window.addEventListener('resize', resize);
resize();

/* 背景粒子 */
const particles = [];
for (let i=0;i<120;i++){
  particles.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*2+0.5,
    sp: Math.random()*0.4+0.1,
    hue: Math.random()*80+240
  });
}

let hueShift = 0;
function drawBackground(energy) {
  // 渐隐拖尾
  bctx.fillStyle = 'rgba(5,1,15,0.25)';
  bctx.fillRect(0,0,W,H);
  hueShift += 0.3 + energy*0.05;
  // 中心光晕随能量脉动
  const glowR = 200 + energy*2.5;
  const grad = bctx.createRadialGradient(CX,CY,0,CX,CY,glowR);
  grad.addColorStop(0, `hsla(${260+Math.sin(hueShift/40)*40},80%,60%,${0.10+energy/600})`);
  grad.addColorStop(1, 'rgba(5,1,15,0)');
  bctx.fillStyle = grad;
  bctx.fillRect(0,0,W,H);
  // 粒子
  for (const p of particles) {
    p.y -= p.sp * (1 + energy/40);
    if (p.y < 0) { p.y = H; p.x = Math.random()*W; }
    bctx.beginPath();
    bctx.arc(p.x, p.y, p.r + energy/120, 0, Math.PI*2);
    bctx.fillStyle = `hsla(${p.hue+hueShift%60},90%,75%,0.7)`;
    bctx.fill();
  }
}

function draw() {
  requestAnimationFrame(draw);
  let energy = 0;
  if (isAudioInit && !audio.paused) {
    analyser.getByteFrequencyData(dataArray);
    for (let i=0;i<dataArray.length;i++) energy += dataArray[i];
    energy = energy / dataArray.length;
  } else {
    energy = 6 + Math.sin(Date.now()/400)*4; // 待机轻微呼吸
  }

  drawBackground(energy);
  vctx.clearRect(0,0,W,H);

  const n = dataArray ? dataArray.length : 128;
  const radius = 175;
  const bars = 100;

  // 环形频谱（围绕唱片）
  vctx.save();
  vctx.translate(CX, CY);
  for (let i=0;i<bars;i++){
    const v = dataArray ? dataArray[i % n] : (Math.sin(i*0.3+Date.now()/300)*30+40);
    const barH = 8 + v * 0.9;
    const ang = (i/bars) * Math.PI*2;
    const hue = (i*3 + hueShift) % 360;
    vctx.save();
    vctx.rotate(ang);
    const g = vctx.createLinearGradient(0, radius, 0, radius+barH);
    g.addColorStop(0, `hsla(${hue},90%,70%,0.95)`);
    g.addColorStop(1, `hsla(${hue+40},90%,55%,0.15)`);
    vctx.fillStyle = g;
    vctx.shadowColor = `hsla(${hue},90%,60%,0.8)`;
    vctx.shadowBlur = 12;
    vctx.fillRect(-2.5, radius, 5, barH);
    vctx.restore();
  }
  vctx.restore();

  // 底部对称柱状频谱
  const barW = W / n;
  for (let i=0;i<n;i++){
    const v = dataArray ? dataArray[i] : (Math.sin(i*0.2+Date.now()/300)*20+25);
    const h = v * (H*0.0018);
    const hue = (i*2 + hueShift) % 360;
    vctx.fillStyle = `hsla(${hue},85%,60%,0.55)`;
    vctx.fillRect(i*barW, H-h, barW*0.8, h);
    vctx.fillRect(W - i*barW - barW*0.8, H-h, barW*0.8, h);
  }

  // 唱片外圈脉动光环
  const ringR = 160 + energy*0.4;
  vctx.beginPath();
  vctx.arc(CX, CY, ringR, 0, Math.PI*2);
  vctx.strokeStyle = `hsla(${(hueShift)%360},90%,70%,${0.15+energy/500})`;
  vctx.lineWidth = 2 + energy/30;
  vctx.stroke();
}
draw();

/* ================= 播放控制 ================= */
function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) {
    audio.play().then(()=>{
      playBtn.textContent = '⏸';
      vinyl.classList.add('playing');
      tonearm.classList.add('playing');
    }).catch(err=>{
      hint.textContent = '⚠ 未找到音频，请点「选择音乐文件」加载《heisemaoyi》或其他歌曲';
    });
  } else {
    audio.pause();
    playBtn.textContent = '▶';
    vinyl.classList.remove('playing');
    tonearm.classList.remove('playing');
  }
}
playBtn.addEventListener('click', togglePlay);
document.getElementById('backBtn').addEventListener('click', ()=> audio.currentTime = Math.max(0, audio.currentTime-10));
document.getElementById('fwdBtn').addEventListener('click', ()=> audio.currentTime = Math.min(audio.duration||0, audio.currentTime+10));

function fmt(s){ if(!s||isNaN(s)) return '0:00'; const m=Math.floor(s/60); const ss=Math.floor(s%60); return m+':'+(ss<10?'0':'')+ss; }
audio.addEventListener('timeupdate', ()=>{
  const p = audio.duration ? (audio.currentTime/audio.duration*100) : 0;
  fill.style.width = p+'%';
  curEl.textContent = fmt(audio.currentTime);
  syncLyric(audio.currentTime);
});
audio.addEventListener('loadedmetadata', ()=>{ durEl.textContent = fmt(audio.duration); });
audio.addEventListener('ended', ()=>{ playBtn.textContent='▶'; vinyl.classList.remove('playing'); tonearm.classList.remove('playing'); });

track.addEventListener('click', e=>{
  const rect = track.getBoundingClientRect();
  const ratio = (e.clientX-rect.left)/rect.width;
  if (audio.duration) audio.currentTime = ratio*audio.duration;
});

volSlider.addEventListener('input', ()=> audio.volume = parseFloat(volSlider.value));

// 键盘：空格 播放/暂停
document.addEventListener('keydown', e=>{
  if (e.code === 'Space'){ e.preventDefault(); togglePlay(); }
});

/* ===== 播放时自动隐藏控制栏，鼠标移动时浮现 ===== */
const controlsEl = document.querySelector('.controls');
let hideTimer = null;
function scheduleHide() {
  clearTimeout(hideTimer);
  if (audio.paused) return;
  hideTimer = setTimeout(()=>{ if(!audio.paused) controlsEl.classList.add('hidden'); }, 2500);
}
function showControls() {
  controlsEl.classList.remove('hidden');
  scheduleHide();
}
audio.addEventListener('play', scheduleHide);
audio.addEventListener('pause', ()=>{ clearTimeout(hideTimer); controlsEl.classList.remove('hidden'); });
document.addEventListener('mousemove', showControls);
document.addEventListener('touchstart', showControls, {passive:true});
controlsEl.addEventListener('mouseenter', ()=>{ clearTimeout(hideTimer); });
controlsEl.addEventListener('mouseleave', scheduleHide);

// 待机提示（无歌词加载时）
const idleLines = ['♪ 土耳其冰激凌 ♪','♪ 沉浸在旋律与光影之中 ♪'];
let li=0;
setInterval(()=>{ if(audio.paused && !lyrics.length){ lyricBox.innerHTML = '<div class="line active">'+idleLines[li%idleLines.length]+'</div>'; li++; } },5000);
</script>
